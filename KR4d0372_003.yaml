body:
  text: 潛山集卷三宋釋文珦撰五言古詩感興一身素貧窶四海長為客客塗不可窮老去少筋力賤者人多棄風霜變顔色歸來旅亭下倚杖三歎息隻字不堪煮萬卷亦徒積未如田舍翁耕桑了衣食身世蟻旋磨日月駒過隙百年竟何為鬢髮空皓白乾坤渺難馮倦羽復奚適一枝願深栖庶以避彈射途中感興悠悠涉長途西日照禾黍回首睇關山故鄉在何許秋風吹櫟林憂思莫能禁同懷不可見日暮空沈吟方矜美少年倐忽傷醜老百年能幾何况復不長保存者日已少逝者日已多榮華亦難恃薤露有遺歌金竹峯雙檜髙亭亭遙見百里外恍疑香烟幢亦若羽葆蓋秀色何其多貞心固常在化龍想非難坐待風雨㑹嵗暮旅思岐路不可極嵗月亦易遒朔風振寒威行子無衾裯厥生良可哀半世空悠悠知音盡淪沒明月難暗投親朋復遐阻日夕生離憂世路世路饒風波生平有終極東西苦漂蕩鬢髮非舊色倦鳥懷安栖老馬思故櫪萬類雖不齊彼此各有適富貴亦偶然何須置胸臆遊興端居念局促聊復起行遊褰裳涉淺瀨隨雲陟髙丘時當孟夏月嘉木清且稠衆鳥相和鳴關關無時休頗覺愜幽抱遂爾忘百憂解衣坐磐石濯足臨長流心空了無取身閒方自由寄言養生客於此同歸休閒人無所管扶藜散幽步古路絶遊塵霜林葉自雨坐石聽流泉頗得空寂趣雲外巢居子邂逅兩相遇語久各忘還見月出深樹彼此無滯情忽散同烟霧歸來夜已深山衣浥清露隤然竟終夕不復脫芒屨鐵鐘驚夢回斗轉東方曙重欲見巢居雲深無覔處不暖亦不寒氣候正清淑岸柳盡垂絲園筍已成竹山禽屢催喚拄杖情又熟出門信吾步豈復計遲速渡水或穿雲山隂又溪曲悠然得真趣此外非所欲昨日出城南行昨日出城南戰陳如雲屯兵刃欲相接殺氣方騰掀黃塵塞天地日月為之昏壯士仗忠義不忘喪其元奮然為前驅誓報明主恩卒伍皆賈勇翕合無異言唯欲紓禍難豈辭屬櫜鞬元戎既啓行旌斾交繽翻謂當奏凱還受爵效屏藩衆寡力不侔傍復乏外援戰久俄敗衄靡聞鉦鼓喧軍中紀律嚴致死無敢奔全師同陷沒千萬無一存肢體膏草莽血流成川源國雖加恤典莫能返其魂白骨蔽四野鬼哭多煩寃懷哉唐虞君大德罔虧騫垂衣成至治萬國皆晏然齊威雖霸主亦賴仲父賢九合不以兵仲尼所稱傳兵乃不祥器聖賢嘗戒旃人茍服其仁斯亦何用焉不屈屈身必受制屈志必違仁受制已則辱違仁道則屯身志兩不辱度幾德之純以此率其性乾坤一間人閒身閒身孰能鞿蕭散隨所欲涼風入芒屨緩步秋塘曲清波淡無涯于以滌心目魚鳥亦忘情何如在濠濮間身出塵表世鞅詎能絶真若寒崖松凌傲幾霜雪枝葉任生枯唯自老根節更有無心雲油然足怡悅釣者吟吾謂釣者徒今古不同流今釣曲為餌古釣直不鈎直釣不在得所得過於求曲釣志在得所得良可羞乃知今古釣不可相為謀好古不好今頗若能自修試問羊裘人亦合子意不西村老叟西村逢老叟事事皆天真髮白不記嵗鳥鳴知是春耕桑了衣食兒女俱和循日暮野中歸荷鋤仍帶薪見人但恭敬塵滿頭上巾未嘗識都邑豈聞有君臣我疑百世下猶有羲皇民梅花梅如姑射仙桃李終難竝雪底暗傳香泉邊孤照影清聲聞麗譙至味入鐘鼎愛者雖繁多知名獨和靖隱顯不同功因之發深省遊仙吾嫌人世隘欣同古仙伍寂爾契沖虛與之相爾汝晨多遊玉清夕每憩園圃身巳外乾坤飄飄自遐舉結交真仙徒翛然凌太清體與虛無合心同日月明逍遙龍鳳駕縹眇雲霓旌豈知區中人狗茍復蠅營喧囂非所事靈府自怡神食每吸丹景飲常漱𤣥津洞覽周八極內照唯一真體妙含至精希微難具陳髙升洞陽界論道太常前與彼羣仙游一夕千萬年眼中屢曽見滄海為桑田時同宴玉醴廣樂聽鈞天超然塵垢外元化實希夷吾生有道骨中心常慕之感通影響然髙真不遐遺導我歸帝鄉雲軿共委蛇青峯萬仭髙雲路多盤紆松柏冬不凋懸溜成石膚上有逍遙天元心與道俱長揖謝塵凡放情常晏如唯服玉石脂千年貌不枯命我登仙壇壇名號𤣥都天風起西極日月生東隅神仙遞升降鸞鶴相號呼拍肩友洪崖揮手招麻姑流目極昭曠使我隘九區山中有至樂功名焉足圗平旦平旦氣偏清境界復深窔初日上東溟髙峯最先照㑹意發長吟何似蘇門嘯不必諧宫商自是山中調清遊清遊興難窮倦就苔磯坐為愛松風涼不知寒日墮鹿下飲溪流猿來摘山果我本貴無聞何用人知我桐溪修梧散瑶碧溪水涵清漪凡翼毋飲棲鳳鳥當來儀山人以自鳴俗士安能知陵谷可變遷此志當勿移旅懷北風吹荒林蕭騷起寒聲客子耳中聞展轉傷離情親朋不在眼他鄉但􅑱􅑱狐死亦首丘奈此終身行琴泉子期不可作伯牙終絶絃泠泠太古音在此幽澗泉泉流如碧玉老僧聽不足後夜月明時還向泉邊宿逝水逝水向東流前後浪相續尼父達機兆川上歎不足人生天地間百年誠短促菁華草頭露光景風中燭兩鬢成枯蓬蕭蕭不再緑那知今日歡不是明朝哭所仰唯聖賢亦復歸鬼録而況頑冥者厥身沈利欲隨流不知返終世常僕僕大化一朝盡腐滅同草木豈若黃綺徒居然在空谷于焉自逍遙其人美如玉吾生千載餘猶知慕遐躅寤寐斯不忘耿耿在心目水西水西多好山山光足娛人一重復一掩比比如魚鱗居來三十年仙佛皆其鄰魚鳥不忘情朝暮長相親遁世乃吾性非因來避秦曽不事緣飾庶事全天真早嘗知夢幻視身若無身無生以為樂此樂難具陳生年生年已六十所厯更萬端富貴等浮雲變滅不足觀身如冬嶺松獨立守嵗寒心如古井水到底無波瀾吾道即古道處今良獨難是非不易辨長歎復長歎曉林日融葉霜滴瀝如涕泣槁葉殊可憐寒風吹女急天復雨嚴霜恐女難自立零落歸草莽晚悟嗟何及朝陽達機兆為女增泫泣屏迹江湖厭風波巖壑事幽屏柴門絶往還自閲朝昏景日出烟霧消鳥散松竹靜須臾日西頽餘暉在髙嶺短生亦如寄舉世孰能省願學逺公儔終然謝塵境夢覺吟百年如大夢夢裏幾紛馳覺後識為夢夢時曽未知吾生今已覺不記夢中時在夢人無限昏昏信可悲吾心吾心靜而貞是乃出天禀驅之入塵樊違性豈不甚所對非同流欲語口還噤世塗機穽多動足常凛凛今來返中林夜卧始安枕山薇既可餐清泉又堪飲布衣極相宜亦不羡文錦斯謀良已臧餘生不須諗枯樹謡髙木引修藤藤束樹身死慎莫進小人終當負君子君子思報德小人易忘恩所與茍非類反為禍之元誠能逺小人終身乃無患世莫輕斯言亦足以為諫道狹踟蹰行道狹難並車相逢苦踟蹰踟蹰將何念所念在康衢康衢平如砥八達無斜迂君子之所履所履常虛邪折旋應規矩永矢無越踰有時亦壅底久之還廓如狹道殊徑捷小人所爭趨夙夜不遑止草露多沾濡勢利迭相傾旋踵成遷渝迷眩不知返逝將致淪胥康衢吾所遵狹道吾所吁遄車返山林守一以自娛大道既凋喪安能復區區南山松柏章松柏何天矯南山何崚嶒松柏有常性南山不騫崩南山人所仰松柏人所承尋常部婁間瑣瑣唯薪蒸彼無髙志徒視此宜自懲堅守嵗寒操亦當慎攸慿青松篇西山有孤松亭亭髙百尺氷雪屢凌厲難變青青色東園盛桃李搖艷矜春容少皥布秋律掃地無遺蹤青松固真心桃李乏堅操君子與小人自古不同調寧忍學桃李誓言作青松偃蹇終不屈傲睨秦皇封針放心養形而放心譬若樹抱蝎表似內已虛識者為憯怛形瘁或當腴心蠧不可活先民有格言勿使本先撥天竺中夜白露變氣候促織階下鳴切切鳴不已倦客心自驚中夜攬衣起星疏松月明念彼同懷人迢迢隔山城此身無羽翼不得東南征聊作相思吟寄此千里情養疾介特無門徒室亦如垂罄隤然類枯株聊以養衰病朝來啓籬户落葉滿苔徑流光遽如斯脆質安能競虛籟起髙林助我發長詠馮深居長余二十三嵗趙東閣長余二十二嵗周汶陽長余一十七嵗皆折行輩與余交淳祐辛丑同訪余於竺山有㑹宿詩距咸淳乙丑已二十五年矣痛先覺之凋零感吾生之既老因成十韻以寄死生之情三老皆達人虛受無蒂芥筆陳絶縱橫詞源極彭湃丁時身屢蹇志道心不懈放浪事物表若曰宇宙隘求我於空間豈識有機械留詩在幽窗足以鎮山怪神靈謹守藏光豔無减殺今朝一長吟頓使老疾差三老不可作吾心亦遄邁中心曷能忘長吟復長喟晨興晨興啓蓬户當面來清風初日麗喬林光影尤玲瓏悠然與心㑹物物皆沖融得喪豈吾事此道足自終山蔬山蔬有真味肉食者不知老我於空林自愛園中葵種蒔俱有法采擷初無時置之折腳鐺燎以枯松枝芼之以薑桂是乃性所宜嗜此已成癖自覺甘如飴既足果吾腹何用五鼎為衆欲不干慮出處常委蛇笑傲泉石間萬象皆吾詩我已自忘我人知我為誰百年百年如大夢夢中誰到老貧賤固可憐富貴亦何好舉世盡蚩蚩醒寤苦不早自古知幾人獨在商山皓百年亦何為終嵗常壈坎𤣥裘不掩脛素髮自垂頷吾親歸夜臺益重霜露感仰視天一方星河同慘淡雲際獨坐雲際坐磐石悠悠兩無心波靜白鷗下山寒黃葉深幽人住何處午磬來清音日暮不能去羣峯生夕隂山人居澗上號澗居因澗作池名鑑止為賦是詩幽人臨澗居為愛澗中水泠泠出雲竇決決漱石齒流行本無意遇坎還自止坎深遂成池寒光映窗几于以鑑禪心清淨絶塵滓唯供種白蓮不洗聞堯耳苦益菜苦菜吾所嗜意與食蘗同古者以益名頗足昭其衷秋花更清妍綽約氷雪容恍疑姑射仙或如采芝翁菊以彭澤顯蓮以濓溪崇此獨無知音沒身蕭艾中人生天壤間用舍為窮通草木豈不然一皆係其逢哭李雪林昔者聞盧殷頗為世所推讀書過萬卷盡以資於詩復聞孟東野氣清而色夷平生嗜章句有甚於渴饑二士舉無子所學竟不施昌黎為買棺又作銘墓辭相去五百年雪林酷似之春谷古人徒生死相維持亦為立佳城著文樹穹碑林兮信不忘千載修名垂梅友梅有嵗寒姿桃李非其偶氷雪見凌厲斯固梅之守伊人清且妍是曰梅之友臭味得所同不在金蘭後溪烟隴月間幽期未嘗負中路勿棄捐友道貴長久吾年吾年未七十頗覺漸昏耄舊事盡遺忘獨餘山水好天寒附葉火塵埃滿烏帽客至欲逢迎無奈筋力耗君當恕衰翁遮莫謂豫傲吾年易逾邁感慨難具陳齒髮半缺秃肌膚多不仁屏迹於空山幾與木石鄰憶昔少年時秉志將求伸所交四方士一一非常人論文窮道要日夕長相親逝者若流水存者猶參辰輾轉空懷思欲見終無因新知棄玼賤坐臥唯一身餘生諒非久當為灰與塵存亡固可念亦復徒傷神於焉息吾慮靜然全天真秋晚懷浙東故人遊人未歸來芳草又還歇悵望江東雲久負山中月扁舟在何處一水不可越相思千里間日暮飛鳥沒紀事似道涉之不肖子也少為博徒游蕩無度憑附椒房之寵謬叨閫寄以敗為勝上罔朝廷躐躋鼎席斫喪國脉納侮北鄰兵連禍結三宫隱憂雖葅醢不足以謝天下而位亢志驕陰謀篡逆言泄於夏金吾金吾欲誅之懼而宵遁雖聖恩寬大不即夷滅使其微有人心當是愧死遂賦詩以紀其實云庸賈狗鼠輩齷齪無足觀少小為博徒狹斜恣遊般憑附椒房寵濫吹於王官匿罪而言功虛聲尚欺謾以之致鼎貴真如沐猴冠擅命十五年肆毒侔蠑蚖仁脉為之絶善類為之殫納侮於北鄰徵盟日囂歡兵戈滿四海天步極艱難鄂漢距江淮列郡多創殘人命若菅蒯聞之心膽寒王家急軍食耕者不得餐罪大已難逭猶思掩其奸駕言督諸軍翶翔向江干小器不自量妄冀於曹瞞潛欲移帝室微辭啓其端賢哉夏金吾直氣生忠肝立欲碎其首無奈師旅單姦謀既已泄局蹐方自歎畏誅竟宵遁梟鵩鎩羽翰逆賊幸屏迹宗社得再安勤王畢雲㑹聖慮行小寬祖宗德澤深國體宜無瘢指日恢中原以盡萬國歡為先雲洲賦塵外地狂賈何人斯曾莫犬豕若包藏竊國機直爾棄天爵逆罪浮草莽盜術逾跖蹻殛死於荒陬厲肉不中臛竄賊亦云晚帝脉以微弱倉扁皆拱手神聖難救藥興亡誰召之禮樂至銷鑠兵戈滿天地騰沸猶鼎鑊億萬蒼生命枕藉委溝壑寰中蕩無章吾徒曷棲託賴有塵外地猶堪遂飛躍泉石盡清竒烟霞地參錯有客賦歸來楸枰見髙著真是離聲名非唯解纓絡山心極閒曠雲蹤忘住著長歌松月髙晏坐林花落游衍狎漁樵追隨任猿鶴他年四方志此日三生約終逃小草譏嘉遁自成樂於焉以求志為記良不惡過賈似道葛嶺舊居順逆人獸心成敗翻覆手鬼神不相容子孫豈能守昔者過此門歌鐘㑹羣醜今者過此門閴然巳豐蔀羞死滿院花顰殘數株栁空室走鼪鼯荒池長蝌蚪轉眼即淒涼况復百年後積釁多自戕盛德斯可久富貴如浮埃於身竟何有為謝髙明人非義慎勿取惟初惟初結髮時志氣凌蒼昊飄然去園廬名山縱幽討流光暗相催於今已衰老滿眼皆少年誰堪寫懷抱潛蹤寂寞濱蕭颯同霜草謂可安餘齡異俗驚我倒頗解空王宗懷之以為寶世故等浮塵棄置勿復道世情世情多反覆衰榮難預卜本是昔時笑翻成今日哭故鄉無舊業客身同草木紛紛輕薄兒誰能顧幽獨雖無祿資身喜有山在目得失何足論長歌倚修竹貧賤詩貧賤交親絶形影自相弔清泉白石間朝夕事吟嘯甑墮何足言灰死不須溺達人乃知此寧免俗士誚
