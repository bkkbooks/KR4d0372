body:
  text: 潛山集卷五宋釋文珦撰七言古月夜聽琴歌石床定起夜方中為豁幽興開房櫳吳天潔淨無雲蹤萬里一色磨青銅明月皎皎行虛空穿松透竹光玲瓏猛虎忽嘯茅屋東林樹葉葉皆生風壯哉宿客清溪翁對月與我調絲桐不拘商羽徵角宫五音迭奏意無窮希聲一一關天聰天神下假山鬼從玄鶴抃舞節奏同延頸舒翼多儀容嘗聞雅樂與政通乃知此語非顓蒙更漏欲徹曲未終西鄰忽打五鼓鐘溪翁憶著溪頭蓬抱琴歸去還匆匆願翁重來勿棄儂儂欲共爾論心胸母子吟遊子行逺方慈母在髙堂砌有忘憂草對之還斷腸母心乃如斯子心其可忘子心茍如母足以感蒼蒼君不見漢蔡雍晉王祥江山縣旅夜江郎峯頭雲漠漠江郎廟前風雨作路傍古寺不可棲破屋殘僧情味惡重尋野店度前林夜寒無奈春衣薄慚愧主人能會意地爐爇火深相慰何似山中夢覺時紙被蒙頭聽松吹夜烏啼東家屋樹與雲齊夜夜有烏來上棲明月照烏栖烏啼愁殺窗中戰士妻官家遣夫戍遼西三年不歸守空閏烏啼不止婦增泣淚痕如雨衣裳濕有美一人行有美一人間且都天然自與常人殊奔逸絶塵遺步趨宛在大海之東隅珠宫貝闕非凡居鮫綃被體雲霞裾朝乘一鶴暮雙鳬往來圎嶠仍方壺所交皆古真仙徒赤松羡門及麻姑共論妙道得道樞天地萬物指馬如人間嵗月良易徂别來眼暗齒髮疏山可􅘧兮海可枯相思之念無時無示好亦有明月珠藏之懷袖不敢沽屢欲致之乏飛魚側身東望空躊躇過苕溪苕溪發源自天目一溪東之漾寒渌岸山續續相照映原田每每資滲漉祗看後浪催前浪當悟新人換舊人來往舟航謾如識到頭若箇曽知津苕霅歌昔聞兩溪水色異苕清霅渾猶渭涇又聞發源自天目懸髙墜峻如建瓴日夜滚滚流不止盡過白蘋紅蓼汀流入太湖不復辨挹之但聞魚鱉鯹堪笑人生亦如此百年汲汲勞其形到頭富貴亦何用一卧泉下無由醒爭似漁翁扁舟獨往最脫灑七十二峯相對長青青春日吟春山青春水緑野鳥啼春聲續續提壺勸我飲杜鵑勸我歸吾歸不待勸吾貧無酒資之二蟲不吾知徒爾為芙蓉花歌東鄰檻外芙蓉花初開粲粲如朝霞今朝花謝枝空在繞樹千回只嘆嗟花謝明年還復開紅顔已去終難回人生不及花枝耐况有流光白髮催遊子對花心盡醉老翁見之如夢寐解把浮生比夢中肯計榮華與憔悴晚秋遊興餘英山中楓葉赤龜溪溪上蘋花白野翁杖屨往來頻為愛溪山好秋色白叟虬髯眼深碧邂逅相歡坐苔石語終長嘯歸青壁恐是雲深避秦客斯人再見雖難期忘機亦有漁樵席藉草班荆相爾汝無主無賓心自適沙鷗飛度夕陽間煙外遙聞一聲笛趙白雲宗丞以詩送惠柳下謁浙西憲使包宏齋命余同賦宏齋伊洛宗白雲風雅主二公在斯世光艷燭寰宇白雲歸帝鄉宏齋庇寒士出處雖小殊憐才酷相似吟詩貧到骨白雲古知音吹送宏齋前雄詞重南金乘流春浩蕩變化那可測君不見北溟有魚會風雲一舉自然生羽翼周草窗命題異人爪搯仙境圖幽齋衆客多清娛辨翁開卷示此圗細畫纎纎比毛髮老眼眴轉視若無須臾神定乃能辨蓬山圎嶠連方壺山川盤紆體勢逺樓觀縹眇棼桴鋪霓旌羽蓋蔽空日雲軿鶴馭交天衢瓌麗綺錯千萬狀一一盡與人間殊辨翁指陳更詳悉言是澄江惠氏所寶之舊物昔有道人方外來暮夜延之入其室蕭然獨卧無燈明時聞爪甲鏗有聲明發道人不知處但見桶底搯畫成吾知道人非小巧物物之中存幻眇更于爪畫兩俱忘當與道人同一笑周草窗吟藁號蠟屐為賦古語嘗聞阮孚心好屐對客蠟之手不釋間暢非唯時所推千載嘉名猶著白辨山山陽有吟翁嗜詩亦與嗜屐同盡將書傳資詩用字字句句加磨礱萬象一時供掇拾大玩於詞成巨集還將蠟屐以自名吾知清尚人難及尚喜江湖有此翁此詩此屐當無窮風雨晚來江上天不分老蛟吐氣成江雲夜半大風飄屋瓦頃刻簷間雨如㵼柴門緊閉不敢開漸聞水聲到床下開門處處聞啼號盡説浪頭三尺髙室廬漂蕩無處所妻孥大半隨波濤江市一時為沮洳急打行包入山去通衢沆漭不可行歷盡西山豺虎路但願自今風雨調無復破塊與鳴條公無渡河河源來自崑崙西滔天沃日無津涯棹夫漁子不敢窺公欲徑渡公誠癡癡公溺死如何為竟委骨肉於蛟螭徒使萬古箜篌悲古松歌山中草木知何數獨愛菴西古松樹千嵗老鶴巢其巔根有茯苓心不蠧秋來是物皆搖落此君徑色還如故嘗聞無用乃全生却恐身為材所誤最好無過是樗散一生不入良工眼神樹詞村西大樹髙入雲樹根作屋祠為神村農四時常祭賽但願長幼無災屯更乞風雨皆調適官不追呼無盜賊六畜蕃滋百穀成報神之賜何終極問農當年未生樹此樹之神何所附它時此樹朽而仆樹神又向何方去農笑吾言吾笑農濁涇清渭終難同為李少監賦秋崖歌四時之氣秋最清千崖風骨方崢嶸石黛碧玉迭照映喬松老柏森縱橫上有白雲可為佩下有寒泉堪濯纓樵夫仰視不敢上鸞鶴日夜長和鳴若有人兮似氷雪以斯崖兮擬髙潔飲玄津兮餐玉屑御清風兮朝帝闕秋浦老漁秋浦老漁人不識清溪數灣船一隻釣竿垂垂釣絲直眼光過似溪光碧得魚歸來不自喫開籠分與白鷴食却來獨坐磯頭石對著斜陽誦周易恐是渭濵薑子牙安得文王與同車蠶婦歎吳儂三月春盡時蠶已三眠蠶正飢家貧無錢買桑餧奈何飢蠶不生絲婦姑携籃自相語誰知我儂心裏苦姑年二十無嫁衣官中催稅聲如虎無衣衣姑猶可緩無絹納官當破産鄰家破産已流離頽垣廢井行人悲鳴鴈行鳴鴈􅗳􅗳來自北一一銜蘆度深磧空受嚴霜損羽毛不為征人寄消息散落湘吳無定所或寄平川或洲渚相喚相呼不亂羣非比寒鴉無次序弋者多懷害爾心栖宿須尋煙水深北風行北風凜凛生邪寒隂雲萬里何􅟎􅟎羣木盡稿葉盡丹日月迅駛猶飛湍人間光景亦易殫離家不如在家安胡為夫君乃遊般自古共嗟行路難摧輪折軸良可嘆客中憂緒常萬端何當對面同歌歡願得此身生羽翰與君相逐同鴛鸞有懷未遂寧容寬耿耿不寐遙夜闌孤鴻求匹聲嘶酸使我感物摧心肝聽野老所言衰翁臥病山之阿東村沈老來相過首言年飢苦無備次説時政多煩苛其間數事盡切已具有本末非差訛農家纍世服畎畝此外寧復知其他世道愈變俗愈薄天意亦復相折磨舉貸養蠶不收繭盡瘁耕耨田無禾千瘡百孔正難補前月里正來催科家貧乏錢辦酒食賣却養命雙種鵝昨朝縣吏又追喚真如鳥雀遭網羅兒女啼號顧弗及心如亂絲頭緒多西鄰寡婦更可念譬彼壞木無枝柯飢寒交煎絶生意母子牽挽沈於河句句皆從痛腸出語罷涕泣俱滂沱民之多艱有如此於乎彼蒼其奈何寒風寒風蕭蕭吹我衣迎晨入山采蕨薇魍魎窺人猛虎嘯草間多露猶未晞歷盡窮崖與隂谷終朝采之不盈掬憂心殷殷日將暮手持空筐返茅屋賊臣惡子厭輕肥志士幽人常苦飢古來萬代共如此樂天知命復何悲讀韓非子非本韓國諸公子胡乃人形心蝮虺身既入秦而媚秦肆無忌憚浮商李狂言著書三十篇讀者能無汙脣齒且言仁義不足用唯有嚴刑堪致治斯言豈足稱人言反悖經常滅天理助秦為虐猶庶幾名教不容良可耻昔者韓虔嘗篡晉逺遡其源固應爾吾欲火書而人人周孔之道不如是旱雨賊臣弄權罔明主億萬蒼生受辛苦大家巨室盡逃亡賸積黃金向郿塢𢎞羊未烹旱如許𢎞羊將烹天乃雨吾言此雨是雨穀點點活人勝珠玉聖恩新放限田租從此農家飽飦粥夏暑正隆望秋得雨因賦長句夏日烈烈揚暉光陽氣入土土力強望秋三日雨滂滂庶物浡然俱阜昌雨暘時若異咎恆粳稻薿薿如人長西風朝夕吹新涼風來已作酒飯香老農再拜謝穹蒼此去足以供蒸嘗只今吏卒多豺狼唯恐肆威加奪攘一粒不得入我腸父子悲啼茹糟粳願將此意達君王母官貪冒官循良走馬引走馬官奴金縷衣食人膏血如瓠肥田夫力耕猶餓死爾曹醉飽忘年飢天視生民同一子胡為不平乃如此人衆勝天且勿驚天若定時天自平答仇山村見寄十年不見山村人瑶華忽到英溪濵見詩猶如見君面讀詩隻字必三咽當今滿眼非吾曹與君例亦同此遭風雅之音幸未變託之足以舒鬱陶頗謂仇仙若鸞鳳造次而鳴亦驚衆丹穴方堪養羽儀他年會作明時用為修樗作歌我愛巖間古樗櫟蔽日參雲過千尺樵蘇來往作隂涼不為風霜變顔色匠氏入林持斧斤材無大小皆選掄豫章楩楠豈復有獨以無用全其身山僧因得養生理故以巖樗自為比只把樛枝庇本根肯誇美幹招殘毁幽人志士當勿疑聽我朗誦巖樗詩縱為梁棟或易撓巖下清風無盡時為山僧作松石歌一片石一株松石如虎距松如龍風雲變化多靈蹤有僧託此憩寂寞心與境會無塵容記得當年採秀於天台萬八千丈之深峯石橋西畔曽相逢溪翁青山映溪三十里水中白石何齒齒是非不入溪翁耳生涯祗在清溪裏終日磯頭坐碧藟釣絲入潭魚唯唯得魚滿籠渾家喜溪光似鏡山如黛不是溪翁不知愛西城行間蹤無滯留有興即行樂﨑嶇歷重丘窈窕窮逺壑遂步西城道修墉帶髙閎門前設梐枑喧喧歌吹聲老人咨嗟語豫故園林曽是前人墓豫謂老人置勿論自古廢興何定據今人歡樂寧長保後人還為傷懷抱靈泉篇髙僧誦經經出泉泉靈不許蛟龍眠湛湛長開古明鏡泠泠暗瀉朱絲絃曽説煮茶甘入齒為是心源功德水淵然千古無是非遮莫放人來洗耳題履道兄古松圗屏間何人畫四松髙標半在煙雲中人來盡作真松看槎丫古怪勢不同一株連蜷如老龍曽見於康廬窈窱之深峯兩株橫斜蒼黛色曽見於鴈蕩髙寒之絶壁最西一株更竒特老來昏耄記不得想得當初落筆時名山洞府遍尋思細將覽勝探幽興暗寫凌霜傲雪姿古來畫者雖無數少有人能得真趣畢宏韋偃骨已寒今日此圗堪獨步主人勸我為作歌才薄無奈此圗何疾書一百六十字勿笑迫促無委他秋月山中放歌秋氣清秋葉鳴四山風骨方崢嶸有時支頤靜對有時緩步遊行朝昏之景無盡藏一皆遺我無人爭中林橡栗又可拾老夫快活不可名乃作歌歌此情雲中木客時來賡山房假寐夢有一客抱琴奏曲而去既覺詩以記之山房夜坐無衆喧隱几而卧方淡然忽夢有人來我前從容為我揮五絃琴聲一一皆清圓如聽廣樂於鈞天曲終倐爾升雲軿亦有笙鶴相後先未知重會在何年臨風别恨空綿綿覺來竟亦何有焉唯聞漏鼓聲咽咽因識死生同寤寐榮枯得失皆無意關山月月從東海出冷照玉門關征人家萬里夢向月中還金閨亦有夢却行玉關道道路不相知思深各衰老胡笳亂吹哀怨多奈此關山明月何終宵迸淚如金波月下吟炎宵喜見月對月還傷神視彼清涼月感吾夢幻身月色鎮長在身將化為塵月照今人盡還照後來人今人後人自歸土此月光輝彌萬古了知身幻不堅牢富貴功名何足取寧退耕巖維石隆湖隱皆嘗有德於余圗報未能而俱下世感念存亡哭以十韻吾生素無寵祿願自向空林灰百念但存心地如砥平不道人間有崖塹皇天幸能念無辜脫我險難歸夷塗天定勝人乃其證紛紛譖舌胡為乎四方交朋盈什百反眼如同不相識豈唯袖手不能援多若蒼蠅變白黑獨有空門三老人或未識面非交親奮身為余直其枉惻隱如此宜稱仁思欲報之苦無力但有此心匪石席今日同為異世人俯仰存亡三太息余行江湖餘五十載備知交態唯熏自聞始終不變因作歌見意焉小人必樹黨勢利相因依勢成乃翕合勢去還睽離君子貴獨立中心存不欺榮華羞附麗衰謝罔棄遺君子與小人於此常見之君子誠可宗小人足堪嗤君不見媚春野卉億萬數花欄映發如有期一朝霜風肆凌厲傍睨不復相扶持澗底喬松過百尺干宵直上無附枝黛色不為時所變淡然自有嵗寒姿臥雪歌潛山道人性疏懶地覆天翻渾不管草座麻衣居絶巘一間茅屋雲常滿頗愛雲縱亦蕭散於焉誓與雲為伴終日臥雲忘早晚夢回日照雲床暖彼此無心體舒緩所以相從加繾綣他年我死雲獨存雲應惋惜吾生短少年走馬行少年走馬去如飛大笑吾衰行走遲吾同君健應無日君似吾衰定有時烏兔交馳猶急傳能令海水桑田變物之大者尚難常何况百年如迅電要知此語非相誣更當持以問麻姑書仇逺吟卷後昔在英溪識仇逺豈意别來陵谷變死生契濶不相知一十四年如過電蓮花峯下得重逢老色駸駸驚上面袖出新吟數百篇非特清新更竒健我道風流似謫仙定知當上金鑾殿愛才未必無明皇薦聞亦有賀知章次教西岑見貽韻宴山山裏白頭翁室空亦復無山童往來山月幾圓缺入山未聾今已聾柴門反關不容呌翁欲養蒙仍養浩莫嫌翁苦戀山中良恐出山為小草懷天目西尖隱者西尖髙插白雲裏下視行人細如蟻客至山翁禪不起天風吹落青松子送僧歸廬山上人家在廬山隂木皮作衣雲作心獨擕鐵錫來參尋禪中悟得唐人吟秋髙忽憶歸山住舊結茅茨連古樹他年我欲尋君去秪恐雲深不知處送僧寒蟲感秋氣非為遊子吟遊子寂寞聞自然動歸心歸到南巖秋欲晚山栗正肥山稼滿山中獨坐看雲時還憶湖邊舊吟伴遣興七十七嵗潛山翁見聞已盡如盲聾祗在山邊水邊住了得人空我亦空鐵心石腸安晚節未輸金口而木舌此真難與時人説明知獨有髙空月
