body:
  text: 潛山集巻八宋釋文珦撰五言律雪霽靜寄向空林於今歲月深因知閒趣味嬾與俗浮沉霽雪千峰玉朝陽萬樹金是吾真富貴不覺動㣲吟為言以道賦巖隱隱者心常靜山林迹易安幾年靈運屐九轉葛𤣥丹石圃菁苖在崖房桂影寒豈知塵世窄萬事雜悲歡湖亭湖波方瀰瀰栁影自珊珊有客坐終日城中無此閒鳥飛明鏡裏人語翠帷間月下清尤甚今宵擬不還行止吟行止定如何江湖歲月多情真疑近傲語直似傷和野饌甘藜藿山衣愛薜蘿因同田父熟學得飯牛歌中殿功徳永夀寺産紫芝厚徳孰能名靈芝自化成人間無此種天上合分莖紫葢隨王母彤雲表帝京僊家多服餌鸞鶴共長生聞似道入相因賦詩盛徳方為貴虛名底用高異時游蕩子今日儗蕭曹紅粉催身朽清霜入鬢牢勢窮人事改槐棘等蓬蒿靜中靜中觀世道一一總非真齟齬英賢詘依馮鄙賤伸狂瀾乗􅄓勢枯木借藤春何似都忘著沈潛自養神山中道士居寂寂老僊家蒼山一逕斜還丹延日月洞府足煙霞野鶴千年壽靈桃幾度花豈知人世上塵事亂如麻贈孤山道士多年於此住賣藥但資身忩冷梅花月門閒栁樹春水妖愁使術山鶴伴朝真果欲求仙道惟應自養神過山家世外無塵累幽居趣味長深蹊竹影薄小圃藥苖香水氣浮溪壁山風掃石牀頻來從此始莫怪老夫狂野步野步任吾情深村復逺坰陂塘波瀰瀰坡壟麥青青竈婦知蠶性田夫識地形牧兒尤可喜記得相牛經春日野步春色在笻履山前山後行野花隨處發林鳥百般聲幽徑遥通寺清流可濯纓村翁忽相值又得盡閒情野步即事疊巘復平原行行足力煩野程難較里旅食蹔依村棗熟兒童聚禾收鳥鵲喧徘徊顧風景不覺念丘園開襟開襟坐石床豈是俗肝腸月露寒秋氣天風生夜涼禽猿四山寂松桂滿林香萬事不相接誰知幽興長山中雪中宵霰雪零寒氣曉來凝崖樹當中折山池到底氷芎縻强食肉松火勝添繒籬户牢關上何人喚得譍送僧之華亭忽爾來相别攜琴便出關此行離日下何事到雲間郭外遥通海舟前少見山應思舊棲處樵屋過秋閒送襄錦二上人之鄞春風湖上别攜手欲何之細問重來日那曾有定期舟行江路永錫掛海峯遲若有東南使相逢即寄詩寄西山嵩雪庭支遁還山去翛然世外心不曾離磵壑長是愛雲林馬放秋場靜龍眠夜井深山林如許到早晚亦相尋贈隱僧高僧成獨往古路少人過切栢貞心在看山靜意多清鐘生響答空翠與雲和不解相隨住其如白髮何酬源上人見寄自從相别後聞過海邦居不得陪鄉話空煩寄逺書林聲隨雨散溪影度雲虛若遂東遊計終朝到子廬送僧之湖南交遊星散盡之子復南行惜别悲楊栁相思寄杜蘅好山須駐錫惡路莫貪程近得湘中信湘中冦未平哭復荆山分講南山日人推學問精彌綸八教網堅實五言城願力生前重聲華滅後清家山孤塔在過者敬如生送敬從可上人愛君心似我十載共隨縁離别從兹始音書何處傳嶺雲迷晩寺江水入春田遥憶歸棲後松門獨夜禪鄞中送坦上人歸故里白雲相見初而子獨知予世態易翻覆道交難間疏三江同逺棹此日晚離袪莫放音書絶東來有鯉魚送僧歸日本逺人仍逺别把手話江臯積水三韓路西風八月濤海門山似粒洋嶼樹如毛他日難通信相思夢寐勞天目禪師歸梁渚舊隐聞師歸渚上欲盡百年閒獨鶴知難侣孤雲不易攀龍孟經幾綴虎錫上重環禪子多求法𤣥門為啟關孤山懐圓法師湖水繞孤峰知曾住此中既傷遺塔變重惜講臺空鵞䕶晴池乳鷹呼古樹風唯聞林處士清節與師同持律僧堅持先佛戒不染世間縁過午都忘食終年只坐禪可曽焚蠧木長是濾蟲泉何日能相見同君話五篇贈隱僧禪居既高靜道氣尤凄清不識市朝路深諳猨鳥情田衣聯槲葉山火燎松明自説歸棲後柴門罷送迎秋日懐新敬二上人所知惟二仲不見意何如别後雲山阻傳來信息虛黍粱收露下草木變霜餘應有悲秋作何曾一寄予霅城重㑹修蘋州江湖身不定十載别年兄忽爾重逢面翻疑是隔生濕雲行有路細雨落無聲惆悵還分手扁舟出郡城太白山老僧二十里松陰居來不厭深雲迷歸日路山是暮年心水黑龍移井風腥虎過林消除萬事盡時或動㣲吟贈苦行僧冺然諸念盡木食貎常羸林下身雖老人間事不知持經被艾衲禮像爇楓脂不是忘形者終難學爾為追送奎上人還鄞隨縁遊上國興盡即言行今日不辭我他宵還夢兄出山雲滿槖歸路水兼程無奈汀洲畔春風草又生送鑑上人還故山偶隨流水出不礙滯人間道樹多年别空門此日還瀑飛春澗淨雲度曉窻閒後㑹應難定相思桂滿山寄天台萬年淮海禪席四海今淮海中年主萬年虛空曾悟性文字不離禪靈瀑煎茶浄寒株拾菌鮮無由親道話夢繞石橋煙送極上人歸永嘉心憶東嘉郡殘年别上都住房抛疏鈔歸槖帶缾盂劚凍江船澀侵星野飯孤高堂見慈母驚怪長髭鬚送通嗣法書僧歸隆興一千餘里路知為爾師行晩嶠踏雲影春江聞浪聲相逢知有約又别似無情莫話傳衣事北宗人恐争送僧行古歸越孤雲無定跡興至即難留獨往經秦望相期隱沃州雪晴分去路風急阻行舟舊住如相問惟煩話旅遊郊行遣興節序易推遷行行感暮年麥雲黄冐隴栁浪緑浮川倦鳥猶知返飄蓬最可憐故鄉無舊業何計賦歸田真樂人皆有所樂此樂獨吾真一静滅萬慮空房無㸃塵雪清梅骨骼烟養竹精神覊絏徒千丈難拘散誕身歲律又將窮山房四壁空水雲蹤不異松柏性元同睡起蹲䲭熟香消貝葉終誰知真樂事却在寂寥中題故人溪亭石泉清浸檻終日逺囂紛境與禪心㑹源從静處分亂峰寒蔽日斷壁晝生雲向此長棲止何人得似君東湖北崦人家柴門映石柟茅屋似僧庵蠶候家人熟耕時父老諳設置當兎徑􅄈竹䕶魚潭賽雨鳴簫皷迎神向水南江上人家江人遂生理社甕足新醅家有兒童樂門無官吏來潮生漁市合風便客帆開水廟迎神罷喧喧皷笛迴冬日山崦人家曲崦人家少謀生各自安墾耕因地力墐塞禦天寒獵火明深嶠漁梁露淺灘老翁知客醉語不到悲歡溪上野人家隔水兩三家荆扉帶郭斜春風喧燕雀時雨足桑麻翁媪皆垂白衣冠不尚華烏蓬船一隻出入渡頭沙向樂古移居山中高懐厭古市買屋住深峯束帛不可聘世人那易逢故家遺石皷好景對金鐘得句凴誰㑹長歌慰井龍贈牛羊司范月谿莫嫌司職小先聖亦曽為蕃息更何事蕭閒且賦詩爾牲誠具止爾牧自來思考牧宣王雅應拈短笛吹贈山友此地長依止人間境亦偏壁蘿斜引蔓崖竹倒垂鞭野鶴通秋夢妖狐恐夜禪願來相伴住解脱世間縁贈林隱君閒居已二毛破屋翳蓬蒿短笛清風在長吟白雪高籬腰懸瓠小栁癭繫船牢自是嫌機事寧持抱甕勞贈同志忘情三十載曽不厭頑疏白石能同煮青山亦共居猨聲依樹樂鳥影入雲虛聞道黄精熟相呼又荷鉏春遊風和宿雨晴幽屨出柴荆好鳥各相語野花如有情心閒何用隱身健豈須名今日不行樂真成孤此生幽處幽處絶煩喧白雲常在門髙歌動澗壑空境外乾坤洗眼菖蒲水輕身枸杞根閒中存至樂難與俗人言野處野處日多暇扶藜信脚行荒原寒鴨陣深巷午雞聲隨地有幽事閒人無滯情歸來新月上照我入柴荆山中吟山林雖寂寞亦可息塵勞野食分猿果寒衣補毳袍雲蹤常散誕松貌極孤高賦詠隨吾意無心更擬騷蓬户蓬户何須啟年來已絶交色空原自了𤣥白任渠嘲琴譜添新曲書囊屏舊抄摶風九萬里安隱愧枝巢有客有客老柴荆終辭世上名因貧諸事省無位一身輕水月通禪意山雲寄野情草衣兼木食亦足了餘生立冬日野外行吟吟行不憚遥風景盡堪抄天水清相入秋冬氣始交飲虹消海曲宿鴈下塘㘭歸去須乗月松門許夜敲塵表塵表多年住身閒人事稀或時聯敝衲終日掩柴扉野鶴惟孤唳寒鴉作陣飛物情從自異於我總忘機題杲東軒闇維齒不壞輪珠變金色全徳寡知音浮漚亦易沉終因三昧火始騐一生心講齒猶存玉輪珠自化金幾多空掩胾遺臭在山林秋分前三日偶成秋光幾一半在候已無雷顥氣凝為露嘉禾秀出胎燕銜餘暑去蟲喚嫩寒來泡影非能久流光又苦催朱静佳挽詞詩有盛唐風人稱一代雄朱絃終自直白簡豈能公官到升朝止身隨過電空傷心千里馬力盡畏塗中殘燈殘燈閃閃青蟋蟀怨空庭骨老似難睡夢寒還易醒凄涼生倦枕沆瀣入疏櫺起視東方白唯餘三兩星山中暑月城市如煁竈輸兹山水鄉松深不見日瀑近自生涼靜裏疑秋至吟邊喜晝長蕉衣與紈扇皆棄在空箱時當末伏暑氣愈隆老者殊不能堪而舊業荒殘清涼石室無由歸隠因賦是詩踽踽復睘睘誰知逺客情衰齡餘六甲酷暑畏三庚舊業今何有秋衣亦未成東鄰弄羌管休作斷腸聲桐州先師塔耿介絶依慿清虛尚飲氷悟明中觀論度越小乗僧夢已三生破神應九品陞法門誰得髓石塔冷孤燈秋日秋氣清如此閒踪信所如因窮流水脉偶到野僧居地逺囂紛息山囘響答虛幾人來不得老死向塵車秋懐西風吹客襟客正白頭吟無復歡娛意惟傷遲暮心飲虹明逺浦饑鶻下荒林日月不相貸人生那易禁田父田父秉耒耜東郊生意繁風和土脉應雨過水花渾麥隴抽新穗秧疇腐宿根春耕易為力歡笑語兒孫旅懐客路何當極家林久未還只今明鏡裏又覺鬢毛斑夜雨添春水寒雲沒曉山彊吟無好思佳句也應慳緑陰滿院一年花信過滿院緑陰多老子於中住新鶯毎到歌蕭閒遺世慮清浄合天和好是孤雲性誰能管得他出户出户逢幽客相攜過别村凍開泥徑滑橋斷石星存雲起難知處泉流自有源老農心甚適耕鑿長兒孫心鏡不存分别見真是與盲同常以身為觀因知色即空無生方㑹道取相未成功此意吾嘗得皆歸心鏡中古柏庭前雙柏子曽入祖師禪黛色參天古貞心比石堅材堪舟楫用名在邶鄘篇歲晚氷霜裏清標獨蔚然初春賡李篔房韻飄零長是客節物更催人前日方辭臘今朝又得辛一天囘暖氣九陌動遊塵心愛青藜杖多年伴老身忘歸久作餘英客溪山似有縁栁堤便野步竹寺稱幽禪結伴尋沙鷺忘歸笑杜鵑翛然繩檢外頗覺勝神仙酬友人見寄山房一事無開篋理殘書習氣嗟難斷閒情為折除菊籬秋爛熳楓徑意蕭疎忽枉瑶華贈知君又起予酬李篔房見寄修篔古君子谿上有清風直節應難並髙標自不同嬋娟消俗慮培養見深功愛此黄鐘管傳聲到谷中野老野老一身輕於今野趣成交遊木上座疏濶楮先生溪甑吹菰米山巵咀菊英林園道子好時復到柴荆溪頭逢野老邀我過橋東牛卧閒田上雞鳴村巷中豆乾霜腹飽蓮倒露房空鄰里交相命桃源風景同老去老去寡交游孤吟倚石樓風生雲漸散虹見雨初收蒼莽天將暮凄清氣似秋𤣥猿慰岑寂長嘯碧峰頭老去𤣥衣敝歸來白屋寒故書多散失時事轉艱難背日松慳長經霜菊盡乾鄰翁猶念舊扶杖數相㸔竹坡舊隱路轉新塘曲舟通别墅幽覺華嚴佛地梵放雜漁謳秔稌連疇晚䔖渠四澤秋竹坡今不作清淚落菟裘隱居隱居那用名名沒隱方成交絶身常定心安病不生山肴珍白簟野飯美青精囘視人間世何如戯一棚嚴維石端研詩端溪下巖石縋鑿出重淵温澤非人力精華得自然龍涎紫霞聚鵒眼碧光圓玉徳終無變斯文萬古傳稻熟而遭巨浸以詩傷之九秋禾正熟三日雨滂沱畎畆黄雲失溝塍白水多豈知民已病猶苦賦重科父子難相保流離可奈何咏梅仙姿孤潔甚不與衆芳期的皪臨寒澗凄清闖短籬祗愁風作惡最與雪相宜野叟心偏愛莓苔古怪枝萬木凋零盡知經幾度霜獨餘氷玉質薫得夢魂香影入清泉瘦聲傳畫角長每因春爛熳惆悵失孤芳怪怪復竒竒照溪三兩枝首陽清骨骼姑射静丰姿桃李應非伍松筠素有期凴他伴幽寂玉笛且休吹冬日交因貧盡絶嬾與病相兼客裏朱顔失吟中白髪添衲衣冬未補霜氣夜來嚴坐待朝曦上支離曝短簷元日作是歲除夕立春臘窮春自至四序遞相延𤣥髪成華髮添年是减年嶰筒灰已動象魏灋初懸吾獨存吾道凝然不受遷錢塘江潮初聞萬馬聲漸覺似長城逺自三山起髙連両岸平淩風添怒勢映日作虛明若是吳胥魄如何渡越兵
