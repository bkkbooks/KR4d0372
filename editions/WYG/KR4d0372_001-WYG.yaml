body:
  text: 潛山集巻一宋釋文珦撰四言古堯任舜禹行堯任舜禹聖化日煕二臣至徳惟堯克知明良胥㑹徵庸弗疑佐命垂統股肱綱維行堯之道蚤夜孳孳上齊七政大錄萬㡬與人為善念兹在兹舉相去凶咨牧授時執徳於心其化若馳洪水滔天浩浩無涯下民昏墊荒度為宜乃乗四載奠決刋隨櫛風沐雨手胼足胝四海㑹同九澤具陂誕敷文徳帝命是祇翔泳咸若鳳皇來儀堯嘉厥功翕受敷施同聲相應百僚師師是知官人安危之基用賢則安用佞則危惟彼陶唐百工允釐後世有述先天弗違能賞能禪纘承伏犧為民之極黄收純衣明並日月照臨無私不言而治端拱無為民無能名蕩蕩巍巍惟天為大惟堯則之先聖斯言當深致思或未之思室是逺而天地無窮行天地無窮人處于中三才既兆庶類皆通至聖立極萬方所宗如星拱北如水朝東垂衣而治天下為公孝慈道廣是謂大同自兹而降謀用是崇兵由此起彊弱相攻上下分亂莫知適從匪兹禮義曷能靖共順之者吉逆之者凶不能率此斯曰顓䝉窮通得䘮實維降衷巧愚不與係於遭逢毋肆小智以菑厥功安時處順於焉考終天道夷簡行天道夷簡蕩蕩巍巍人心不然大行險􅇖轉眼翻覆誠不易知忠或見疎信或見疑離間致入寧復顧思昔者繾綣終焉棄遺聖如周公王猶不知孝若申生姬能死之在彼盛時尚有爾為况乎季世顛倒是非讒人飽禄志士苦飢俯仰今古其誰不悲命懸于天逆之為嗤沖静無患進取必危守道安危其殆庶幾禍福之兆可以理推夷齊去周西山採薇黄綺避秦商巖茹芝景行先哲良足為規規而罔念雖悔何追天道雖逺行天道雖逺人心匪殊内直不欺與天為徒對越無媿陟降恒俱祝史陳言曾非矯誣桑林之禱金縢之書至誠感通如皷應桴神人以和大信以孚不勉不思自止于符天有常道人無異塗志斯一矣天其逺諸大道既漓人心日渝背天從欲覆族亡軀作善降祥為惡速辜聖言孔彰是訓是謨一念之差千里而迂惟當自修以反厥初别日何易行别日何易㑹日何難道路修阻山川鬱盤寤寐懐思涕泣汍瀾思君不已損我容顔時歌舊章期以自寛歌終太息反開憂端孤鴻嘹唳過彼雲間欲托遺音遐征不還出户徘徊風露淒寒明月皎皎星斗䦨干羅帷飄揚顧影難安耿耿長夜摧此心肝北遊朔城行北遊朔城險阻艱難荒溪遐曠穹谷紆盤白日晦景隂雲洞寒凝冰不冶積雪寧乾凍草色死北風聲酸林嘯猛虎路多胡豻愁膓分裂趼足蹣跚風餐不飽露宿難安别離之苦維昔所歎懐哉征人曷云来還山中放歌并序翁年七十有五息影空閒寂寞之濱期與世絶因作歌以見不復出山之意其辭曰春草離離秋蘭猗猗足紉吾衣南山有芝西山有薇足樂吾飢誰信誰疑誰是誰非足亡吾機或瘞或焚或暴或沉足為吾歸生浮死休己而巳而出山何為歌闋聲消隠几而息夢為飛雲遨遊八極我為雲邪無待無得窅然皆䘮自適夫道吾心之適富兮貴兮吾不與易五言古靈鳥篇嘗聞有靈鳥其名為鳳凰九苞信嘉瑞五色成文章其宿必丹穴其鳴在朝陽有徳斯出現徳衰還伏蔵始至於少皥再巣於陶唐舜恩被動植聞韶復翺翔閔其出非時見歌於楚狂仲尼歎不至是亦為世傷蕩蕩二千齡孰能致斯祥當今邁三五君明臣且良其或一來儀足以慰萬方鳳兮儻不來吾淚徒滂滂羌笛美竹生窮崖西人翦為笛制度誠簡易不假金玉飾五音既繁㑹八音亦交出鳳鳴何雝雝龍吟尤厯厯貪者聴之廉愁者聴之懌悍者聴之和勞者聴之佚遺調感人多今人孰能識空復想桓伊三弄楚天碧悠悠萬里行悠悠萬里行河畔草青青青草有衰歇逺行無期程秦既滅六國驅民築長城長城三千里将以限北兵城邊沙水寒飲馬馬悲鳴築夫困久役誰無郷土情父母念孝養室家歎孤嬛萬一死於築白骨空支撑膏血脂草莽魂魄亦飄零苦哉築城人舉杵無樂聲仁守國自固不仁禍斯宏祖龍不知此縱暴勞蒼生髙明鬼瞰室天道常惡盈長城徒髙髙不救秦祚傾豈若唐虞君垂衣燕泰寧至徳亘萬古巍巍不可名征婦怨寧為路傍草莫作戰士妻初嫁席未温夫今戍遼西憶與夫别時山川正飛雪腰間弓箭重冰凍馬蹄裂夫君在萬里如何可相求瞻彼日月光使妾心悠悠悠悠復悠悠相思曷云已夜夜勞夢魂遥遥渡遼水軍中有紀律君當慎終始勿以念室家無心事戎壘自昔忠義人從軍皆效死杜宇朝夕啼客舍檐樹間杜宇蜀帝魂啼時吻流血知有思歸人日夜啼不絶吾歸渺無期汝啼豈易説故宮春草深髙堂滿簪雪讀史有感明良但間作瑣瑣常相因讒䛕既得志聖哲多罹屯大化造萬物差品難具陳薰蕕不同器仁暴當異倫使之混而處枘鑿安能親西伯居羑里仲尼傷獲麟遂使黄綺徒商山終避秦潄泉茹紫芝揮手謝世人戒奢羲農至舜禹所尚惟樸素迨及三代衰君臣皆不度其源既已開展轉若塗附秦漢距陳隋相沿少知悟傷財而害民多不能永祚乃知縱奢淫天人所同惡金玉不可衣錦綉不可茹所貴在農桑工巧皆民蠧秋胡詩潔婦與秋胡以禮成配匹畢結方五朝秋胡事行役道塗既云逺年運亦易徂日月迭相代五囘見榮枯秋胡仕侯邦音塵久疎絶誓言奉姑嫜秋霜擬貞潔春日行採桑援柯向前林秋胡倏來歸相逢贈黄金重義不受金采采實筐篚歸來見夫婿乃是贈金子苦辭讓其諐投身入淵死豈是不愛身示心如此水浮萍寄水行浮萍寄諸水漂流本無根倚水以為命然後生意蕃女子方在室怙恃父母恩及其既結髮託身向他門室家以禮合偕老古所敦畢力閨中事未嘗憚其煩夙興而夜寐黽勉無後言徳音罔違越生育皆充完夫壻輕薄兒翻覆何無端青天起雲雷無風作濤瀾中情一朝異棄舊淫新婚宴爾如兄弟視我同讎怨非唯不見答暴怒難具論妃耦道遂䘮安能久自存祇憐妾薄命仰天每長歎願還念昔者無為卒相諼静夜不寐行静夜不遑寐秋氣殊清清霜露塗庭蕪隕葉摧枝莖西風更蕭騷萬竅皆同聲蜻蛚亦含悲嘖嘖牀下鳴出門一以視青天綴繁星三五正縱横北斗方斜傾飛鴻朔方來迢迢困遐征中路失儔侶隻影何㷀㷀感物懐逺人徘徊以屏營心折不能言黙黙徒憤盈贈道士褚雪巘褚君樂嘉遯門徑多青蕪心同水月皎身與山雲俱古壁懸篆籀不愛燒藥鑪南華註已畢終然得𤣥珠髙風度寥廓逸韻淩江湖䇿杖時過我以我機事無中情了無取斯為真隠徒知己換凡骨何時上清都賡趙别駕天寧古檜韻檜龍奮頭角百獸毋敢獰居然護祇園老鬽䰟􅅎驚本根既深固樛枝任縱横秋城風雨癡或躍常夜鳴夜鳴不自己江頭雲霧生乗雲何所之變化朝帝京歸來氣尚豪撼動老禪兄空庭儼相對健骨殊淒清中林萬古松或可為同盟蒲柳先秋凋襟期信難并異質誠正直扶持乃神明更看霜雪繁黛色挺孤擎江頭雨霽雨收江路涼徐行吊孤影逺岫夕陽明平洲霽華静渡頭人盡歸佳趣在漁艇漁翁不自知醉臥風吹醒鏡中放歌日日行鏡中身與白鷗同閒蹤無滯留清興何始終紅蕖耀晨籹緑蒲媚新叢長歌對漁父滄浪有遺風野外即事春暮倉庚鳴農家語堪聴雨暘不違時麥髙桑葉青烹豚酌清酒廟中謝神靈田蠶杯珓好歡聲動林坰祭罷各分散羣鳥啄餘腥結交結交盡閒交日欲共幽討道人失前期使我縈懐抱清猿往相催同來須及早良恐秋風髙吹我杞菊老逺别曲問君何所之執手立前墀可堪為逺别都不道囘期簷間蠨蛸蟲似知妾心悲纒綿結離恨千絲仍萬絲投宿山家山家忘四時力作倦還息鴉鳴知欲曙雞栖念當夕兩男皆長成盡解供賦役季女方及笄亦復能紡績老翁獨無事醉飽岸巾幘喜客到柴扉掃室具枕席棗栗非外求園蔬更堪摘殷勤活生理頗覺計自得我生獨何為轉徙常寄食語殘燈欲死草際蟲嘖嘖廢塜荒草沒頽垣知是何人墓髙頂上牛羊空間住狐兔行旅為傷神子孫在何處飋飋起悲風蕭騷白楊樹鄞江送友西風日夜起江上楓葉赤可憐未歸人復送行逺客相見鬢毛改轉覺世路迫他日慰相思豈必在書尺薄俗能移人出處當自力喜晴郊行雨初歇野徑泥猶滑斜日照殘雲雲邊飛鳥没别浦有行舟乗流櫂歌發對景未能去沙頭待新月經旬雨不斷今日喜新霽杖策東臯行桑柘隂翳翳蠶老欲登箔菜麥亦可刈田園足生理外此盡誤計父老誠見客吾駕從兹税客夜客館何寥寥明月竟牕户青天懸列星零露霑宿莽懐感不遑寐起坐聴漏皷聴罷復重聴聴徹三四五觀海粤自兩儀分溟波長諸水涵渟昭體量沆瀁無涯涘一目但浺瀜百川競輸委東聞號扶桑西或稱濛汜浴日揚明輝浮天忘表裏神靈奠厥居鱗介安攸止蜃氣成樓臺珠光耀坻沚漁商所依憑利用何窮已鼓楫通九夷乘風超萬里初唯見平相漸得悟深理儻可覓蓬萊當從赤松子永嘉迪古巖作亭楳竹間東閣為摘少陵天寒翠袖薄日暮倚修竹句扁曰寒倚書來索詩寄題四韻凛凛冰玉質亭亭雪霜姿共此嵗寒操不與東風期羣芳性苦殊道人心自知悠然澹相對千載有遐思蠶麥辭山人日無事行行自娛嬉竹西數家村喜聞翁媼辭蠶以禦我寒麥以充我飢二者嘗致禱羣神将我貽繭必大如甕繭繭皆成絲麥必生兩岐粒粒皆可炊儻得遂所願報謝無敢遲此意頗淳古當見於周詩夢覺辭霜月何皎皎寒風更淒淒氣候感微蟲終夜常悲啼遊子當此時能不念故棲念久結為夢逺過横塘西此夢亦良勞屢涉山谷溪宛然見親友笑語相招攜覺來仍在旅郷逺人乖暌浮生等如夢短長不須稽晚宿山寺日晚投山寺蕭然異人境石房雲氣深苔階雨聲冷心清不成寐篝燈對孤影清猿亦可人長嘯西南頂題東臯東臯縱遐目生意良自多魚躍喜冰釋鳥語乗春和芳蘭馥餘荄名花眩喬柯倦客獨無依奈此庶物何披雲亭我愛山中人㝠心住幽寂危亭上絶巘不染世人跡羣峯合空翠疑若天宇窄午夜獨長嘯雲開山月白題聴松亭别駕公事閒翦棘開三徑天風引長松蕭蕭滿清聴坐石琴意真憑欄醉魂醒亦使山中人悠然動歸興題靈泉寺更幽軒寒泉發靈竇翠靄生重岡偶因山鳥鳴得此林僧房髙槐肅夜氣短牖熙晨光空門了無事嵗月静中忘為清渭濱賦集清軒詩造化既槖籥坱圠斯無窮下達于幽隂上徹于穹窿物各限己私是以無全功髙人作軒宇與彼造化通洋水皆心深一碧涵虛空洗盡世間塵萬象皆冲融乾坤清淑氣大集於其中為語登軒人快覩開昏䝉郊外春日垂楊褭東風桐花醉鳴鳩地僻無行人方塘水交流春夜夢遊溪上如世傳桃源與梵僧仙子遇具蟠桃丹液靈芝胡麻於雲窻霧閣間請賦古詩頗有思致覺而恍然猶能記憶五句云灘峻舟行遲亂峯青虬蟠一瀑素霓吼靈桃粲丹朱僊飯雜芝糗遂追述夢事足成一十七韻隨意作清遊唯與笻竹偶徘徊望原田宛轉赴林藪隔溪更幽竒欲往興彌厚漁人自知心涉我不待叩爛爛桃花明粼粼白沙走灘峻舟行遲輟棹入崖口亂峯青虬蟠一瀑素霓吼微徑上青㝠髙木掛星斗梵宇金碧開萬象發䝉蔀老僧雪眉長妙語滌心垢乗雲者何人笙鶴自先後邀余過殊庭酌以流霞酒靈桃粲丹朱僊飯雜芝糗白鹿守天壇彩煙生藥臼謂言保其真物我盡芻狗窻外鐵鐘鳴驚覺復何有乃知百年間夢境匪長久夢中作棄置何足憂貧賤元非病山邊水邊行頗適幽人情柴門絶輪鞅蒼苔滿修徑忽聴漁者歌還動江湖興記夢神清發幽夢夢到仙人峯老仙啓𤣥門問我來何從仙髮映山緑仙顔眩日紅髙低種玉田異植方茸茸里閭見翁媼亦復非塵容雞犬聲相聞略與桃源同雲中飛僊人縹緲如游龍遄征不可即得非是喬松白雲既變滅仙軿亦無蹤夢覺兩何有聞打西林鐘過嚴灘登子陵釣臺幽人山水心獨向新安去應為一絲風元非釣名具浪髙灘七里片石還如故囘首問雲臺荒煙渺無處旅感苦無住山資千里逺為客兄弟㑹面難雙親鬢毛白故園書不來愁緒日夜積滿庭枯草根忽復化新碧大水後作田家望西成彌月雨霖霔流潦迷川澤秔稻盡漂淤牛犬犇崇丘雞亦栖髙樹室廬畢沈沒野老無歸處大家還急租官中未蠲賦妻子多轉徙天髙不可籲但願吾皇知聖恩加咻噢下詔發倉廩賑䘏散紅腐不唯赤子活亦使根本固八表皆歸仁萬嵗永終譽秋懐霜風吹槁梧索索生秋聲梁燕已無跡哀鴻復南征遊子當此時轉覺難為情庭闈隔千里日夜白髮生倣古思邊去年與君别緑樹聞啼鴂今年當此時憶君君未歸音書難寄逺珠淚濕羅衣秋光秋光已過半風氣日淒𦂳鴻鴈復來賓燕鶯無留影遊子於此時感物念郷井縱使夢能歸歸塗難厯省送歸篇秋老木葉乾露冷蟲聲死征人未授衣鄉心日千里揮手睇雲帆頃刻限煙水他時慰相思逺寄書一紙
