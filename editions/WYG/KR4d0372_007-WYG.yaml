body:
  text: 潛山集巻七宋釋文珦撰五言律馮深居宰㑹稽詔辟稽山縣清風在一琴那知致君術不是字民心官舍桐隂合圜扉草色深退衙人吏散應共野僧吟送趙寒泉重宰南中邑字民無異術薄斂與寛刑宓子琴猶在蒍于歌重聴瘴雲消晝黒毒草變春青萬里南中路秋風幾驛亭錢塘晚渡殘日下重城寒潮起暮聲岸遥江樹小天闊野雲平一水分吴越孤舟寄死生如何未歸者猶此計鄉程泛富春江夢寐羊裘客清遊樂此邦一篙殘臘雨千古富春江岸轉青螺合烟眀白鳥雙洗除名利跡灘瀨日舂撞釣臺世祖龍飛日𤣥纁起故人榮名既無取閒足固應伸釣石闗乾象江流入富春髙風千古在来者自迷津懐寄南陵尉沈道正南陵初作尉應亦似南昌名在神仙籍才優翰墨場盗聞無欲止吏化不欺良交舊如君少懐思未易忘寄潛齋王尚書自解朝纓去西山有的傳此心如白水把酒問青天直道難諧俗閒身勝得仙山林鐘鼎味併在小梅邉客中㑹友客塗方浩蕩嵗物正蕭條相見江城暮俱傷鬢髪凋隂雲将變雪寒水不成潮明日還為别離愁未易消重逰天台華頂峯梯空上華頂老脚尚能堪照膽泉源異薰人藥氣酣危巅窺巨浸晴日破重嵐記得前囘到幽人未結庵天台三萬丈華頂入穹蒼片石群魔懾千年古寺荒樹枯頳菌出僧老白眉長極目滄溟際烟波更𣺌茫野興野人乗野興短策勝華軒緩歩有幽趣長歌非俗言烟霞僊佛境皷笛鬼神村遯世今成樂浮華豈足論天台野興短策堪扶老飄飄野興濃山行不知逺真侣或相逢積溜穿幽石長蘿上古松今宵随處宿難定在何峯示山友地僻斷知聞相過知有君晴溪堪數石晚岫暗通雲果熟猨無數松髙鶴不羣深居豈無事終勝世紛紛鴈蕩大龍湫深蹊入薜蘿一瀑㵼巖阿曾閲西天志言居諾詎羅斜飛疑是雨清激自成渦下有蒼龍窟樵人不敢過采菖蒲鴈蕩髙寒處穿雲採得来豈能同野草容易有花開瘦節偏宜石纎叢不受埃幽人知爾性暁澗汲泉杯客袂客袂只翩翩家林何處邉天寒愁逺道木落感衰年惨澹漁村日凄涼鴈渚烟秋来更多疾空有夢歸田贈山中琴友雲影晝沉沉雲邉草徑深樹為幽鳥宅山是隠人心静室無他物清風寄一琴調髙唯自識不問有知音山中僧日落西山浄雲歸北崦昏老僧方在定童子不譍門伏虎知慈力靈禽演法言檻前泉數斛清澈是心源旅夜秋宵似嵗長旅館更荒涼燈暗䑕出穴天寒蟲近床羇棲彌嵗月老大易悲傷幸有茅廬在何為别故鄉離人厭夜長獨起坐空床苦雨遲家信秋雲隔舊鄉燭殘重作燄桂濕不生香倘得歸期遂閒居在上方宿海上正覺寺霜滿啼猿石風迴落鴈洲半生為逺客此夕欠同流白月無窮意滄波不盡秋倚䦨吟未足長嘯上峯頭過逸人居尚此髙閑久空林舊徑存掩闗防俗駕登閣俯鄰園植竹驚初笋移花過别根幽懐在自得勿易與人言為林隠君賦石田石田所無用君獨愛斯名應為詩書種免教人世争秋風還自穫春雨不須耕除是長沮輩能知髙隠情胡逸人幽居幽居清絶甚四面盡滄波栁步春船集花源晩吹和宦情垂釣薄吟思捲簾多便有書来辟其如愛此何澤國幽居夏日雜題澤國無袢暑幽居趣自長花開殊旦暮稲熟間青黄急雨分塍下㣲風度水涼斷除車馬跡日日聴魚桹為得近樵漁来尋此地居省交長閉戸耽静欲焚書自愛心清淡人嫌禮貌踈徑荒從草沒衰懶不能除逺逰林憩無完室舟行避惡灘異鄉為客久浮俗定交難草引春愁長霜侵暁夢殘忽聞城角動歸思若為安客中春日客處空林下貧唯七尺單重隂迷暁色細雨作春寒鄉信慿誰寄離情强自寛一詩吟未稳倚遍石池欄春日春泉青似澱春嶂碧于螺逺近随吾意芒鞵幽興多人生行樂爾富貴復如何難與時人道風前獨放歌麥秋遊興心喜麥秋晴貪遊舉歩輕泬寥無㸃翳山水有餘清怕入紅欄隊来尋白社盟應門童子熟認得老夫聲宋氏林園徑穿荒草入門向斷河開不是君居此應無人到来種花逢雨活接樹待春囘冷咲求名者衣間有俗埃集奉川道中一路盤雲逺連朝策瘦笻神祠依古木佛屋占竒峰立石分田界疏泉作澗舂因思似鄉土歸意忽然濃雨夜身同水上萍老去尚飄零逺客人誰到空床夢獨醒閃雲雙電紫晦雨一燈青慷慨長歌發歌聲入杳㝠登太白絶頂龍池望逺蒼莽勢連空躋攀徑絶蹤亂峰排似㦸片石響於鐘鳥語春雲宻龍歸暮雨重下觀羣岫小始覺此為宗湖寺上方通𤣥峰頂峰頂非人世青山滿目多塔層侵樹影鐘響度湖波心外元無境詩成亦是魔禪翁清浄耳渾不聴笙歌客遊客遊忘嵗月長是自調心野水偏多浪浮雲易作隂途窮何用哭興到即須吟吟到忘言境方諧正始音旅况日暮投村館悽然逆旅情地荒頻有盗城逺不聞更度嵗無多日思鄉是幾程聴雞還束被霜月伴晨征柘溪道中荒烟迷小市細雨隔遥津麥浪農疇晚桐花客路春㡬畨時序换兩鬢雪霜新唯有溪邉鷺相看似故人山中古墓白石蒼苔路荒涼古墓門看来百嵗後曾有㡬人存故物餘翁仲今誰是子孫狐貍穿敗穴殘魄不能言懐歸西國此世為何世吾身亦幻身固應常􅊬􅊬其可效頻頻餞日懐鄉國聞鶯憶故人得歸方始樂久客厭風塵老大老大偏多感那堪客路中凄涼經月病安忍半生窮衰草凝霜白髙楓借日紅今朝方暫起先問菊花叢散人乾坤有散人事事不闗身斂念息諸妄到頭唯一真忘榮寧慮辱無富豈嫌貧雖道青山好猶知是外塵探幽秋色令人愛青藜助逺探柿楓丹互映天水碧相􅇽絶景沙鷗占幽程野老諳謂予雲外去更有古龍潭立春日上國又逢春衣裳化客塵園廬空入夢嵗月但依人生意歸羣物窮愁老一身喜餘鷗鷺伴猶不恠吾真臘月立明年春閏嵗兩畨春流光故逼人月筩将謝丑斗柄倐旋寅玉作梅容潤金歸栁眼新物情雖萬變曾莫變吾真吳中靈巖寺離宫今作寺徃事日荒蕪越女承恩寵吴王失霸圖屧廊斜帶嶺香徑直通湖莫上琴臺望風烟滿舊都廢宅昔年誇富貴磨㓕等流塵應是重歸燕難尋舊主人徑莎空泣露門栁不成春唯有同遊客經過感嘅頻天目山逸人居隠處元無路烟霞素所期不逢樵子說那有世人知樹老囘春晚山髙見日遲欲為重到約恐爾又深移西風西風落葉間孤客有餘閒寒水皆歸壑秋雲不離山鶻翻枯草去鴉帶夕陽還幽趣何人共柴門祇自闗歸興歸興比春濃迢遥發鏡中船頭指西日㠶腹飽春風岸栁眉舒黛源桃臉露紅到家天已暝童穉候衰翁墜壁嶺石徑随山轉迢迢十里餘險曾稱地壁髙合號天衢老樹因風折新畬趂雨鋤層巔人不到異鳥自相呼歸棲竺嶺将啟午供野鶴必鳴寺僧常以此為候古寺千峰表雲泉處處佳山靈嫌俗駕野鶴喚僧齋静黙通𤣥理幽深惬隠懐閒門何用掃秋葉任平階陟三十六渡溪唐隖嶺三十六渡溪溪邉絶去蹊亂山如疊浪一嶺類登梯風𦂳妖蛇出烟昏異鳥啼蜀僧言劔閣與此亦相齊山巅水涯布韈與青鞵山巔復水涯閒為真富貴吟是好情懐既可全吾樂何慙與世乖自隨無畚插忘死亦忘骸殘夜清坐壺更猶未徹起坐看螢流夜氣清如水禪心淡似秋月沉西嶺樹鐘動上方樓可有昏㝠者知吾所得優龍井崖井􅇽虗碧心塵望即空遥通滄海脉近出白雲峰旱夕翻為雨饑年屢變豐小魚纔似葉誰識是真龍五洩龍井五井蜿蜒宅幽深父老言傍溪唯見瀑度嶺始知源夾谷斜暉隠空林夕電翻屢聞當早嵗噀雨出松門雷峯不定似飛蓬還来宿此峯霜欺孤客枕風亂四山鐘好夢如氷薄歸心與酒濃舊房誰占住門有最長松嵗旱經嵗雨不作溪源皆絶流旱妖長似夏蟲響謾占秋滿目傷黎庶焦心在冕旒天河盍傾㵼併洗甲兵憂行飛来冷泉水石間鷲嶺清無盡池亭趣亦佳泉衝沙觜出石壓樹身斜居者應遺世逰人欲忘家蓮華峰更好惜被白雲遮秋野即事深原草徑斜烟際兩三家老屋門無鑰清溪底見沙斷蟬嘶敗栁孤蝶戀寒花厯省曾逰處分明似若耶安分鷃鵬雖有異小大各逍遥静處安吾分塵縁坐見消烟霞開古色松栢尚髙標更愛無生侶時来伴寂寥甲子嵗初夏連雨作寒雨脚何當斷風頭不肯收中宵還集霰四月尚重裘客有塗泥嘆民懐畎畆憂是誰同爕理對此合包羞苦雨秋雨連三月愁吟野水濆漸看禾黍沒難使渭涇分山澤纔通氣天霄便作雲民憂昏墊苦苦語不堪聞秋色西郊金氣盛庶物减華滋蘀蘀丹楓雨茫茫白草衰炎曦何惨淡氣曀若委遲對此凄涼景能無宋玉悲送楊菊屋菊屋何為者耽吟嘔肺肝短衣空自詠長鋏向誰彈不計為儒誤唯言得句難幾人憐此别把酒不成歡送友山臨東郭暮路轉北原斜此地輕為别孤蓬不戀家客程何地盡離思滿天涯明日重陽至同誰對菊花送人送子西風裏令予起别愁何時通逺信逾月在孤舟野果經霜實潮田帶露收眀朝於此地獨自倚髙樓送北征人與君俱是客那復送君行未卜重逢日難為欲别情露花皆逺淚風葉是愁聲到日寒應極脩途七十程休糧僧禪貌如氷雪禪心去町畦休糧烟火絶養氣語言低空室無闗鑰随身止杖藜不曾遊聚落終老只山棲送極太初住鄞江寶嚴閫相招惟重邦人望亦濃欲開新象教應掃舊孤蹤烟水浮缾錫雲山應皷鐘寳嚴初變土遥想雨花重送雅上人自鄞歸杭之子幡然别何人伴寂寥相從非世道獨去是寒朝目送孤㠶逺魂随暁浪消重来須定約莫待隔江招野僧野僧塵慮盡住在最深峰庭樹巢孤鶴崖湫宅老龍瀑綃懸百尺雲幌羃千重静裏𤣥機發登樓夜擊鐘送杞上人歸於潛山同鄉唯子在欲别意何如歸路青苔逺還家白露初山光圍古邑溪影渡寒魚須為過星渚髙風似二疏送僧空山草木秋相送古原頭倦客難為别寒蛩替說愁舊房深翠壁歸路隔滄洲後夜多明月相思為上樓候禽候禽来報我春巳到園林凍解通泉脉風和動草心由来增齒臘翻是促光隂其可陪人事衰遲已不任竹居簷外竹珊珊空房住一間無人曾到此老子有餘閑土蝕銅罇綠苔滋粉壁斑於焉自成樂遮莫笑癡頑懐别越中友人白首蒼山裏生涯舊已空别離人易逺江海意無窮夜月悲新蛬秋烟落斷鴻遥思来徃處朝暮有樵風山中秋日懐友庭樹涼飈入西山爽氣多獨行清澗曲閒詠紫芝歌野饌甘黄獨山衣足薜蘿幽人同此好何事不相過夜坐孤蟾如鑑明照我坐寒更列宿光芒淡滿林風露清人行守犬吠猿過宿禽驚静趣慿誰㑹忘言對短檠古寺古寺居深處随緣掃一房本圖依水石因得避炎涼皓鶴巢松潔青蟲蠧橘香但教終逺俗貧賤亦何妨
