body:
  text: 潛山集巻十宋釋文珦撰七言律遊越吴客来遊古越都緬懐前事更踟蹰髙峯篆刻空秦望遺廟丹青尚禹謨佛屋幾遷王令宅官租半入賀家湖日斜欲返烟城去栁下春船不受呼出越城訪歸隱庵主人何事相尋向此遊入城不似出城幽山於屋外參差見水到門前欵曲流樹腹半空栖伏翼竹梢初動蔓牽牛分明記得前回過斜月疎鐘到客舟書懐為知不是功名骨換着方袍入翠微身事半生貧裏過家園千里夢中歸尋詩野寺雲黏屐采藥名山露濕衣似此疎狂爭怪得從来野鶴自難鞿雁蕩大龍湫此水昔年人不見梵僧来説始知名飛揚半雜烟嵐氣斷續全同風雨聲四壁倚空疑鬼鑿一峯當面自天成雖然未作山中住曽到山中夢亦清農家繞屋桑麻槿作籬當門一樹白薔薇老翁請喚牛醫至穉子鞭攔鴨陣歸賽願酒豐同飲福輸官絹足各裁衣年年十月農功畢還向谿頭整釣磯千里千里辭家比塞鴻飄飄不定又還東波平蹔喜扁舟穏天濶回瞻故壘空别墅烟昏歸晚牧長江雨歇掛晴虹前程行止誰能計已悟浮生似夢中偶泛偶泛扁舟向海埏初非有意訪神仙蓬莱方丈不可問漢武秦皇空復然水上樓臺皆蜃氣石間膏馥是龍涎麻姑曽共方平説行復揚塵變土田苕溪夜泛萍踪人泛清苕去水宿風餐幾度經結網燈沈漁浦霧待艐船泊酒家亭樹頭栖鷺疑殘雪草上流螢似亂星夜後夢回寒月上棹歌聲裏弁山青武康道中又過防風舊國西客懐煙景兩淒淒青山環繞疑無路白水分流盡入溪竹外野祠荒甃缺栁邉漁户草廬低萍蓬漂轉成何事不及林猿有定棲讀伍子胥史事惆悵當年死屬鏤到頭忠義竟何如眼懸城郭空懐舊魂寄江濤尚賈餘向使君王從諫諍未應宫闕便丘墟唯應教得䲭夷子萬里扁舟計不疎行窩吟了無一事可相拘布襪青鞵信所如亂石荒苔樵子徑竹籬茅舍隠人居山林真樂須還我朝市閑名不問渠頗謂行窩安樂法逺勝叔夜養生書東湖荷花酣紅膩綠三千頃總是波神變化成出自淤泥元不染開於玉井舊知名暑天勝似涼天好葉氣過於花氣清何事濂溪偏愛此為他枝蔓不曽生五朶峰莫知小朶飛来日慧理曽經指異蹤香潤儘多西竺石孤髙亦有晉朝松斷無一幹栖凡鳥别有深泓卧老龍絶頂世人遊不到瑶叢清麗似芙蓉觀禹貢九州歴代帝王國都地理圖萬里江山幾廢興覽圖真合拊吾膺三王二帝皆難問兩漢六朝何所稱此日中原全拱北異時深谷或為陵看来今古皆如夢夢境虛無豈足慿戍婦詞新婚便别比秋胡何似當年莫嫁夫身在朔方征戍乆鴈来南國信音無空閨寂寂寒宵永荒路悠悠逺夢孤聞道仙家能縮地癡心要覔長房符水亭冩興為愛幽亭枕碧流乗閒於此對沙鷗荷傾宿雨明珠碎蒲颭輕風翠帶柔列岫周遭疑雉堞斷霞零落似汀洲無人相與言清事落日鳴蟬滿樹愁送趙東閣罷官歸永嘉一年吟抱寄京華幾度相逢說永嘉夢入西山尋枸杞約歸東閣看梅花風霜摧拉知何事雨露生成自有涯應笑屈平終不返空留遺恨在長沙奉酬鹽倉李丈金橘銀魚之什為有風流賀季真道齋從此徃来頻錦囊牙軸詩千卷金橘銀魚酒一巡見我每呼蓮社客看君還是竹林人有時夜話寒更盡明日相逢語又新子思恵詩用韻酬之老慵祗合在雞羣變化那能慕海鵾壯嵗親朋多死别窮途造化與生存欲尋衣食愁無路却被妻孥怨少恩健筆期君今落第相賙未得剰空論晚秋閒歩晚来閒歩閲秋光田上人家盡滌場逺浦寒波浮鴈鶩荒山落日下牛羊客鬢巳非當日黒菊花空似去年黄因聴翁媪言音異又復令人憶故鄉尋山家路入深原三四里林蔵雞犬十餘家村籬疎宻齊栽枳山崦髙低盡種畬石罅春風生野筍洞中流水出殘花愛同樵客言幽事不覺歸途暮景斜客裏客裏還驚莭序還倚䦨搔首獨淒然垂開栁眼如相看落盡梅花又可憐幻境自知如夢螘離情㡬欲託啼鵑數聲忽聴烏檐角欵曲吹殘谷口煙首夏獨遊響潭不解驅馳巧作謀偃然守拙卧林丘方忻嫩綠成槐夏又愛輕寒作麥秋龍宅清深唯獨往鶯聲欵曲似相留僧言瀑布巖尤好明日須當到上頭看新歴又看景定新頒歴百嵗還驚五十過憶昔壯懐多曠逺只今衰鬢已蹉跎飄零世路饒荆棘展轉歸心念薜蘿春草夕陽江上去不堪回首一長歌閒人不求富貴不嫌貧天地悠悠任此身飛歩任教趨要路好懐到底屬閒人自歸白屋交遊逺認得青山面目真平地退蔵知是寳太行從古有摧輪春盡日春去無縁得暫留意行曉到古原頭落花随水如多怨老栁因風不奈愁鵑聲作意歸何許蝶夢無慿覺即休林叟相逢俱一笑都縁彼此是同流晚春遣興始聴隣屋響秋碪獨住閒房春又深徧地繁花非故色一忩涼葉是新隂倉庚謾得東君意杜宇偏傷逺客心莭物相催身易老臨風時復動悲吟酬李篔房元日見寄韻五年嬾踏上京塵真是乾坤散誕身正向山中閒卧雪忽聞户外報迎春且傾竹葉屠蘇酒休畫桃符鬰壘神底事詩筒来徃宻結交多是苦吟人酬篔房秋崖昆仲見寄韻嵗月駸駸苦易過凝霜還見委庭莎從来桑下不三宿此去榆光尚幾何舊社乆荒誰復記逺公難覔恨空多諸賢頼有劉雷在時寄新詩到薜蘿余與篔房秋崖冬日㑹於沙谿春復㑹於龜谿適逢祠山誕辰二翁有詩見貽依韻酬荅沙谿谿上看梅夕苔徑荒涼月暈黄何事重尋老吟伴為難同入少年場和風澹澹行花塢春水溶溶滿栁塘尚欲重聴送神曲祗愁明月雨淋浪題慈照坦上人房應山閣禪心直以山為體不與終南㨗徑同吟乆白雲生曲檻定回明月在前峯子牙釣石臨溪古博望槎源與漢通自有山靈回俗駕幾人於此得相逢食苦筍老去居山樂最真盤蔬日日冨前陳愛嘗苦筍疏甜筍似進忠臣逺佞臣飯為韻清常倍食酒因味爽或添巡美芹之意全相似頗謂堪將獻紫宸遊囊山禮妙應祖師慧薫塔踏徧諸方倦說禪偶逢佳處結良縁祖師聖觧何須舉衲子家風要别傳雲外壺中如聚墨望中滄海欲浮天如今覿面相呈了啼鳥落花俱寂然山居冬日白水青山不礙禪登髙臨逺意翛然老梅卧雪香逾逺瘦栢凌霜骨更堅四海交逰多契濶一生陶冩賴詩篇人間萬事俱抛棄自此閒居又幾年别馨桂山與君相見各華顛握手松間感變遷能記靈山同聴日不疑絳縣老人年難尋舊夢悲蝴蝶替說新愁賴杜鵑無奈怱怱又還别有詩須寄武康船客居借得空房住十春野麋山鹿日相新寧嫌老景猶為客却喜閑身不屬人於轉物時觀世界向無心處得天真深居謝絶曽非傲朽鈍形骸畏屈伸閒居遣興無情日月互相磨萬古悠悠一逝波六十四年成事少八千餘卷費功多山林有志知難變毁譽無根聴自訛近問野人安穏法教予祗學採樵歌雲林雲林佳處輙遲留不覺駸駸白盡頭率野唯聞多虎兕到門那得有羊裘老身真箇如山静徃事從教逐水流富貴功名是何物纔堪休處便須休放吟心絶馳競如安流身逃繫屬同虛舟無車毎每跨黄犢有暇時時盟白鷗随分嬉遊随分樂可曽計較可曽愁老吟亦不記聲律亂冩孟郊沙井頭一生一生踪跡任浮沉兩鬢何為雪易侵不可破除唯道義最難慿託是人心清溪路口閒雲合白版門前落葉深老子衰年嬾酬應若非同伴莫相尋由樵徑登北髙峯遂至韜光庵鳥路欹傾不可登攀縁直上最髙層隂崖老樹春無葉古竇寒泉夏作氷斜抱江流縈翠帶亂山分脉走瓜藤雲根細紀當年事太守曽来訪隠僧村行即事客中頗覺身無事徐歩西村引興長茅舎竹籬分向背麥畦麻稜間青黄少婦乗時方煑繭老翁擇日又移秧農家滿眼皆生意應是無心出此鄉山居身寄孤猨野鶴鄉邇来真與世相忘東南地闕多流水西北山髙少夕陽根有茯苓松色異土生蘭茝蘚苔香細將萬事都思徧唯有閒居味最長肯道山居太寂寥不妨随分自逍遥盡空眼界終無翳為厭聲塵亦去瓢菊老尚能存正色松孤還自有髙標道人樂地唯如此說與同流意更消送春老人無復趂春場見說春歸亦送將唯恐再来吾不見偏於此别意難忘花枝卧雨紅顔盡草蔓梳風綠髮長作計欲留留不住聊歌一曲當離觴登臨冩興臨水登山送此生禽猿箇箇盡忘情破除妄念唯空寂蔵蓄危機是利名老子樂時誰不笑衆人重處我能輕有時信口長歌發好似東陽獨自精春草菶菶萋萋緑漸滋昔人辭意足堪推由来南浦傷離日不似西堂得句時行旅獨看空感慨池塘闗夢自神竒吾雖萬事皆慵嬾春草生時亦有詩世味世味從前已備嘗重罹世難轉悽傷肯希逸驥能千里最善靈龜解六蔵覽勝每尋清伴侣觀山别是好心膓年逾七十唯求死便不埋時也不妨幽處惡圓難與俗浮沉野處窮居嵗月深青嶂於予偏有分白雲嫌道太無心人間富貴皆塵物世外風泉是好音老去翛然竟何事若非入静即閒吟篔房秋崖来訪不相值後徃謝之篔復有詩喜余之至因次其韻吟車曽到社橋来不見山人乞食回荒沼秋深蓮已謝寒林冬近菊初開句引淵明無酒琖觀迎元度但茶杯尋盟却喜梅花發日日論詩坐碧苔石室石室閒眠過午鐘看来唯我最疎慵生憎俗客妨幽趣不與樵夫說定蹤麋下磵隂時引子鶴歸林表只依松人生未觧休心去多向塵區歎不逢野寺感逆賈而作野寺居来嵗月長幽深真是隠人鄉怪枝結頂青松古巨石分流碧澗長拈弄詩章非俗事斷除禪病得良方因悲竊國亡身者枉作塵勞夢一塲題逆賈逆賈猖狂秉國鈞民彛帝業總成塵䖍劉幾似刀兵刼全活幸䝉天地仁衆醉有誰知甲子獨醒還自記庚申諸子有紂之時天下皆醉不知甲子唯箕子獨醒之語庚申乃藝祖受禪年鼎湖龍馭重囬首應悔當年錯用人晚歩竹杖芒鞵晚歩遲為貪山水有清暉栖鴉已帶殘陽去牧堅遥穿薄靄歸可保禪身終放浪從教塵世各脂韋閒中自有無窮樂敢道麻衣勝錦衣因悟因悟維顛匪一繩遂無心續祖師燈祗圖塵世難窺影逺入深峯不記層土木形骸從朽腐氷霜志節自堅凝非吾同伴如相覔牢閉蓬門定不譍天地之間有此身天地之間有此身此身豈肯惹風塵竹籬茅舍居来穏紙帳蒲圑趣更真行已作成山水癖到頭不是利名人使予生遇陶唐世當與許由巢父倫老身老身到此合稱翁雙足蹣跚兩耳聾聊託迂疎居世表幸無名字到官中生期槁木寒灰盡性與孤猿野鶴同去嵗有錐無地卓今年錐地併皆空洞霄宫山勢逶迤九鎻分洞天終自異人羣君王在昔曽逰幸故老猶今述見聞瀑濺鶴衣明似雪氣蒸龍穴暗成雲夢囬髣髴鳴笙磬定有㳺仙拜老君出遊歸隱出遊歸隠兩無心非慕沃洲支道林㗖栢自然閑土銼製荷曽不費金鍼悠悠徃事空塵夢冉冉餘生任陸沉頗謂天閑千里馬難勝寥廓九臯禽山中老宿雲壑居来嵗月長千株松下一間房掃空心地苕花帚熏徹根塵栢子香施法定應拈塵柄接人曽不下禪床生縁已自都忘了唯道西歸有故鄉禪翁禪翁八十鬢如霜冷坐雲邉舊竹房唯放此身長嬾散更無餘事可思量飛流激石泉珠迸斜照入林松影長即景成詩疑未穏更尋樵父為平章哭恭仲温信敬謙勤徳更純江湖風誼最相親曽知九要三𤣥髓豈混重泉一窖塵此日傷心亡我友異時再面是他人山中弟子懐師徳各翦生綃暗冩真西風西風吹鬢鬢成霜變異無端那有常交友後先同昨夢老人八十尚他鄉書空鴈字行疎宻泣砌蟲吟韻短長盡是客中秋意緒誰能對此不凄涼歸来歸来巖下養衰形日日眠雲聴瀑聲但愛一閒堪佚老翻思萬巻是勞生人嫌草座麻衣陋自守芝翁木客盟沒齒如斯吾事足更無他事可闗情自愛自愛予生愛性真真存渾不管渠嗔從来有水有山處著得無名無利人騰踏豈須誇駔駿幽潛端可養精神盡向雲邉尋隠迹誰知雲是老夫身人夀人夀百年三萬日有誰曽滿百年来騰騰任運聊堪樂汩汩勞生盡可哀富貴惟増身外累酕醄當覆掌中杯到頭一等皆歸死未死須教笑口開老子老子深棲趣已成塵鞿何計可相縈寒泉一道知来脉靈木多年産寄生雲外暗蔵龍虎穴風中清度鶴猿聲過從等是無心侣同喫山厨芋顆羮
