body:
  text: 潛山集卷十宋釋文珦撰七言律遊越吳客來遊古越都緬懷前事更踟蹰髙峯篆刻空秦望遺廟丹青尚禹謨佛屋幾遷王令宅官租半入賀家湖日斜欲返煙城去栁下春船不受呼出越城訪歸隱庵主人何事相尋向此遊入城不似出城幽山於屋外參差見水到門前欵曲流樹腹半空栖伏翼竹梢初動蔓牽牛分明記得前回過斜月疏鐘到客舟書懷為知不是功名骨換著方袍入翠微身事半生貧裏過家園千里夢中歸尋詩野寺雲黏屐采藥名山露濕衣似此疏狂爭怪得從來野鶴自難鞿雁蕩大龍湫此水昔年人不見梵僧來説始知名飛揚半雜煙嵐氣斷續全同風雨聲四壁倚空疑鬼鑿一峯當面自天成雖然未作山中住曽到山中夢亦清農家繞屋桑麻槿作籬當門一樹白薔薇老翁請喚牛醫至稚子鞭攔鴨陳歸賽願酒豐同飲福輸官絹足各裁衣年年十月農功畢還向溪頭整釣磯千里千里辭家比塞鴻飄飄不定又還東波平暫喜扁舟穩天濶回瞻故壘空别墅煙昏歸晚牧長江雨歇挂晴虹前程行止誰能計已悟浮生似夢中偶泛偶泛扁舟向海埏初非有意訪神仙蓬萊方丈不可問漢武秦皇空復然水上樓臺皆蜃氣石間膏馥是龍涎麻姑曽共方平説行復揚塵變土田苕溪夜泛萍蹤人泛清苕去水宿風餐幾度經結網燈沈漁浦霧待艐船泊酒家亭樹頭栖鷺疑殘雪草上流螢似亂星夜後夢回寒月上棹歌聲裏辨山青武康道中又過防風舊國西客懷煙景兩淒淒青山環繞疑無路白水分流盡入溪竹外野祠荒甃缺栁邉漁户草廬低萍蓬漂轉成何事不及林猿有定棲讀伍子胥史事惆悵當年死屬鏤到頭忠義竟何如眼懸城郭空懷舊魂寄江濤尚賈餘向使君王從諫諍未應宫闕便丘墟唯應教得鴟夷子萬里扁舟計不疏行窩吟了無一事可相拘布襪青鞋信所如亂石荒苔樵子徑竹籬茅舍隱人居山林真樂須還我朝市間名不問渠頗謂行窩安樂法逺勝叔夜養生書東湖荷花酣紅膩緑三千頃總是波神變化成出自淤泥元不染開於玉井舊知名暑天勝似涼天好葉氣過於花氣清何事濂溪偏愛此為他枝蔓不曽生五朵峰莫知小朵飛來日慧理曽經指異蹤香潤儘多西竺石孤髙亦有晉朝松斷無一幹栖凡鳥别有深泓卧老龍絶頂世人遊不到瑶叢清麗似芙蓉觀禹貢九州歷代帝王國都地理圖萬里江山幾廢興覽圖真合拊吾膺三王二帝皆難問兩漢六朝何所稱此日中原全拱北異時深谷或為陵看來今古皆如夢夢境虛無豈足慿戍婦詞新婚便别比秋胡何似當年莫嫁夫身在朔方征戍久鴈來南國信音無空閨寂寂寒宵永荒路悠悠逺夢孤聞道仙家能縮地癡心要覔長房符水亭寫興為愛幽亭枕碧流乘間於此對沙鷗荷傾宿雨明珠碎蒲颭輕風翠帶柔列岫周遭疑雉堞斷霞零落似汀洲無人相與言清事落日鳴蟬滿樹愁送趙東閣罷官歸永嘉一年吟抱寄京華幾度相逢説永嘉夢入西山尋枸杞約歸東閣看梅花風霜摧拉知何事雨露生成自有涯應笑屈平終不返空留遺恨在長沙奉酬鹽倉李丈金橘銀魚之什為有風流賀季真道齋從此往來頻錦囊牙軸詩千卷金橘銀魚酒一巡見我每呼蓮社客看君還是竹林人有時夜話寒更盡明日相逢語又新子思惠詩用韻酬之老慵祗合在雞羣變化那能慕海鵾壯嵗親朋多死别窮途造化與生存欲尋衣食愁無路却被妻孥怨少恩健筆期君今落第相賙未得剩空論晚秋間步晚來間步閲秋光田上人家盡滌場逺浦寒波浮鴈鶩荒山落日下牛羊客鬢巳非當日黑菊花空似去年黃因聽翁媪言音異又復令人憶故鄉尋山家路入深原三四里林藏雞犬十餘家村籬疏密齊栽枳山崦髙低盡種畬石罅春風生野筍洞中流水出殘花愛同樵客言幽事不覺歸途暮景斜客裏客裏還驚莭序還倚闌搔首獨淒然垂開栁眼如相看落盡梅花又可憐幻境自知如夢蟻離情幾欲託啼鵑數聲忽聽烏簷角欵曲吹殘谷口煙首夏獨遊響潭不解驅馳巧作謀偃然守拙卧林丘方欣嫩緑成槐夏又愛輕寒作麥秋龍宅清深唯獨往鶯聲欵曲似相留僧言瀑布巖尤好明日須當到上頭看新歷又看景定新頒歷百嵗還驚五十過憶昔壯懷多曠逺只今衰鬢已蹉跎飄零世路饒荆棘展轉歸心念薜蘿春草夕陽江上去不堪回首一長歌間人不求富貴不嫌貧天地悠悠任此身飛步任教趨要路好懷到底屬間人自歸白屋交遊逺認得青山面目真平地退藏知是寶太行從古有摧輪春盡日春去無緣得暫留意行曉到古原頭落花隨水如多怨老栁因風不奈愁鵑聲作意歸何許蝶夢無慿覺即休林叟相逢俱一笑都緣彼此是同流晚春遣興始聽鄰屋響秋砧獨住間房春又深遍地繁花非故色一忩涼葉是新隂倉庚謾得東君意杜宇偏傷逺客心莭物相催身易老臨風時復動悲吟酬李篔房元日見寄韻五年懶踏上京塵真是乾坤散誕身正向山中間卧雪忽聞户外報迎春且傾竹葉屠蘇酒休畫桃符鬱壘神底事詩筒來往密結交多是苦吟人酬篔房秋崖昆仲見寄韻嵗月駸駸苦易過凝霜還見委庭莎從來桑下不三宿此去榆光尚幾何舊社久荒誰復記逺公難覔恨空多諸賢賴有劉雷在時寄新詩到薜蘿余與篔房秋崖冬日會於沙溪春復會於龜溪適逢祠山誕辰二翁有詩見貽依韻酬答沙溪溪上看梅夕苔徑荒涼月暈黃何事重尋老吟伴為難同入少年場和風淡淡行花塢春水溶溶滿栁塘尚欲重聽送神曲祗愁明月雨淋浪題慈照坦上人房應山閣禪心直以山為體不與終南捷徑同吟久白雲生曲檻定回明月在前峯子牙釣石臨溪古博望槎源與漢通自有山靈回俗駕幾人於此得相逢食苦筍老去居山樂最真盤蔬日日冨前陳愛嘗苦筍疏甜筍似進忠臣逺佞臣飯為韻清常倍食酒因味爽或添巡美芹之意全相似頗謂堪將獻紫宸遊囊山禮妙應祖師慧薰塔踏遍諸方倦説禪偶逢佳處結良緣祖師聖解何須舉衲子家風要别傳雲外壺中如聚墨望中滄海欲浮天如今覿面相呈了啼鳥落花俱寂然山居冬日白水青山不礙禪登髙臨逺意翛然老梅卧雪香逾逺瘦柏凌霜骨更堅四海交逰多契濶一生陶寫賴詩篇人間萬事俱拋棄自此間居又幾年别馨桂山與君相見各華顛握手松間感變遷能記靈山同聽日不疑絳縣老人年難尋舊夢悲蝴蝶替説新愁賴杜鵑無奈匆匆又還别有詩須寄武康船客居借得空房住十春野麋山鹿日相新寧嫌老景猶為客却喜間身不屬人於轉物時觀世界向無心處得天真深居謝絶曽非傲朽鈍形骸畏屈伸間居遣興無情日月互相磨萬古悠悠一逝波六十四年成事少八千餘卷費功多山林有志知難變毁譽無根聽自訛近問野人安穩法教豫祗學採樵歌雲林雲林佳處輒遲留不覺駸駸白盡頭率野唯聞多虎兕到門那得有羊裘老身真箇如山靜往事從教逐水流富貴功名是何物才堪休處便須休放吟心絶馳競如安流身逃繫屬同虛舟無車每每跨黃犢有暇時時盟白鷗隨分嬉遊隨分樂可曽計較可曽愁老吟亦不記聲律亂寫孟郊沙井頭一生一生蹤迹任浮沉兩鬢何為雪易侵不可破除唯道義最難慿託是人心清溪路口間雲合白版門前落葉深老子衰年懶酬應若非同伴莫相尋由樵徑登北髙峯遂至韜光庵鳥路欹傾不可登攀緣直上最髙層隂崖老樹春無葉古竇寒泉夏作氷斜抱江流縈翠帶亂山分脈走瓜藤雲根細紀當年事太守曽來訪隱僧村行即事客中頗覺身無事徐步西村引興長茅舍竹籬分向背麥畦麻稜間青黃少婦乘時方煮繭老翁擇日又移秧農家滿眼皆生意應是無心出此鄉山居身寄孤猿野鶴鄉邇來真與世相忘東南地闕多流水西北山髙少夕陽根有茯苓松色異土生蘭茝蘚苔香細將萬事都思遍唯有間居味最長肯道山居太寂寥不妨隨分自逍遙盡空眼界終無翳為厭聲塵亦去瓢菊老尚能存正色松孤還自有髙標道人樂地唯如此説與同流意更消送春老人無復趂春場見説春歸亦送將唯恐再來吾不見偏於此别意難忘花枝卧雨紅顔盡草蔓梳風緑髮長作計欲留留不住聊歌一曲當離觴登臨寫興臨水登山送此生禽猿箇箇盡忘情破除妄念唯空寂藏蓄危機是利名老子樂時誰不笑衆人重處我能輕有時信口長歌發好似東陽獨自精春草菶菶萋萋緑漸滋昔人辭意足堪推由來南浦傷離日不似西堂得句時行旅獨看空感慨池塘關夢自神竒吾雖萬事皆慵懶春草生時亦有詩世味世味從前已備嘗重罹世難轉悽傷肯希逸驥能千里最善靈龜解六藏覽勝每尋清伴侣觀山别是好心腸年逾七十唯求死便不埋時也不妨幽處惡圓難與俗浮沉野處窮居嵗月深青嶂於豫偏有分白雲嫌道太無心人間富貴皆塵物世外風泉是好音老去翛然竟何事若非入靜即間吟篔房秋崖來訪不相值後往謝之篔復有詩喜余之至因次其韻吟車曽到社橋來不見山人乞食回荒沼秋深蓮已謝寒林冬近菊初開句引淵明無酒盞觀迎元度但茶杯尋盟却喜梅花發日日論詩坐碧苔石室石室間眠過午鐘看來唯我最疏慵生憎俗客妨幽趣不與樵夫説定蹤麋下澗隂時引子鶴歸林表只依松人生未解休心去多向塵區歎不逢野寺感逆賈而作野寺居來嵗月長幽深真是隱人鄉怪枝結頂青松古巨石分流碧澗長拈弄詩章非俗事斷除禪病得良方因悲竊國亡身者枉作塵勞夢一場題逆賈逆賈猖狂秉國鈞民彛帝業總成塵虔劉幾似刀兵劫全活幸蒙天地仁衆醉有誰知甲子獨醒還自記庚申諸子有紂之時天下皆醉不知甲子唯箕子獨醒之語庚申乃藝祖受禪年鼎湖龍馭重回首應悔當年錯用人晚步竹杖芒鞋晚步遲為貪山水有清暉栖鴉已帶殘陽去牧堅遙穿薄靄歸可保禪身終放浪從教塵世各脂韋間中自有無窮樂敢道麻衣勝錦衣因悟因悟維顛匪一繩遂無心續祖師燈祗圖塵世難窺影逺入深峯不記層土木形骸從朽腐氷霜志節自堅凝非吾同伴如相覔牢閉蓬門定不譍天地之間有此身天地之間有此身此身豈肯惹風塵竹籬茅舍居來穩紙帳蒲圑趣更真行已作成山水癖到頭不是利名人使豫生遇陶唐世當與許由巢父倫老身老身到此合稱翁雙足蹣跚兩耳聾聊託迂疏居世表幸無名字到官中生期稿木寒灰盡性與孤猿野鶴同去嵗有錐無地卓今年錐地併皆空洞霄宫山勢逶迤九鎖分洞天終自異人羣君王在昔曽逰幸故老猶今述見聞瀑濺鶴衣明似雪氣蒸龍穴暗成雲夢回髣佛鳴笙磬定有遊仙拜老君出遊歸隱出遊歸隱兩無心非慕沃洲支道林啖柏自然間土銼製荷曽不費金針悠悠往事空塵夢冉冉餘生任陸沉頗謂天間千里馬難勝寥廓九臯禽山中老宿雲壑居來嵗月長千株松下一間房掃空心地苕花帚熏徹根塵柏子香施法定應拈塵柄接人曽不下禪床生緣已自都忘了唯道西歸有故鄉禪翁禪翁八十鬢如霜冷坐雲邉舊竹房唯放此身長懶散更無餘事可思量飛流激石泉珠迸斜照入林松影長即景成詩疑未穩更尋樵父為平章哭恭仲溫信敬謙勤德更純江湖風誼最相親曽知九要三玄髓豈混重泉一窖塵此日傷心亡我友異時再面是他人山中弟子懷師德各翦生綃暗寫真西風西風吹鬢鬢成霜變異無端那有常交友後先同昨夢老人八十尚他鄉書空鴈字行疏密泣砌蟲吟韻短長盡是客中秋意緒誰能對此不凄涼歸來歸來巖下養衰形日日眠雲聽瀑聲但愛一間堪佚老翻思萬卷是勞生人嫌草座麻衣陋自守芝翁木客盟沒齒如斯吾事足更無他事可關情自愛自愛豫生愛性真真存渾不管渠嗔從來有水有山處著得無名無利人騰踏豈須誇駔駿幽潛端可養精神盡向雲邉尋隱迹誰知雲是老夫身人夀人夀百年三萬日有誰曽滿百年來騰騰任運聊堪樂汩汩勞生盡可哀富貴惟增身外纍酕醄當覆掌中杯到頭一等皆歸死未死須教笑口開老子老子深棲趣已成塵鞿何計可相縈寒泉一道知來脈靈木多年産寄生雲外暗藏龍虎穴風中清度鶴猿聲過從等是無心侣同喫山厨芋顆羮
