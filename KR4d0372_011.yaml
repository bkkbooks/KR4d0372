body:
  text: 潛山集卷十一宋釋文珦撰五言絶句採蓮曲蕩槳入平湖湖波渺無極紅白芙蓉花何如妾顔色荷葉似儂鬢荷花似儂妝夫壻常别離羞見雙鴛鴦採蓮莫傷根傷根不成藕因思藕不成悔作征人婦採蓮惟採花不敢採蓮子其中有苦意與妾心相似種蘭菊菊蒔陶籬本蘭滋楚畹芳荷鋤春雨後懷古意何長經旬經旬坐春雨畏濕不下席曉看籬角萱怒長忽過尺農謡斗種播良田可收三十石天豫人奪之耕夫每無食贈道士褚雪巘身不離珠庭新箋道德經時來琪樹下間看鶴梳翎晚泊煙生浦欲無日暮潮初落客帆何處來又近垂楊泊梅花梅花如隱人不與羣芳競别塢春風多寒流照清影山中月夜秋月滿疏林林影自零亂白猿啼一聲山空夜將半曉行寒雞誤客行躑躅犯霜露氷凍不生潮娥江夜難渡晚暝色生前浦日沉西嶺樹隱約有孤僧逺入深雲去殘陽下西岑暝色起平坂林下一僧歸鐘聲煙際逺漁艇炊菰青蘆叢釣魚白蘋洲扁舟不用楫蕩漾隨春流斜枕緑蓑衣醉眠呼不醒午夜天無雲月滿孤篷頂客枕客枕正無憀寒雞鳴夜半開門望天末月沉星爛爛客枕難成夢秋宵轉覺長莎雞鳴不住階下月如霜逆旅逆旅夜冥冥寒燈結燼青一聲霜鴈過倦客夢初醒秋感霜露變羣物遊子難為情吾親隔重泉奈此風葉聲久客客裏又深秋凄涼怕舉頭西風吹敗葉葉葉是歸愁客中客中春又半舊隱欲歸難唯恐傷懷抱花開不欲看東岡曉雪蕭蕭夜來雪失却登山徑曉望東岡頭寒花滿松頂送僧歸浙東舊隱青山下歸程白露前他時此相憶懊惱浙江船竹堂秋雨秋雨滴寒竹主人魂夢清客來聽未慣認作打蓬聲西明落照幽居面西嶺窗几有真趣睡覺無人聲殘陽在髙樹題畫鷗鷺雪衣明忘機更間暇青青芳草間嫋嫋垂楊下蒲長荷巳折秋水碧相涵日照沙洲暖鴛鴦睡正酣淺水與平沙煙光盡相接鳥立折茄莖蟹上枯荷葉翠羽立蒹葭巨蟹行沮洳狂僧淡墨間無限滄洲趣墨菊淵明愛佳色靈均餐落英墨衣林下去標致更淒清蒲萄畫弱蔓引修藤垂旒泫水晶憶曽江路見風露熟秋棚墨萱丹粉轉成緇風姿尚瀟灑對此可忘憂依依北堂下書友人墨萱後卷淡然自忘憂獨立薰風裏紅樂非其倫緇衣古君子月蝕酷哉蝦蟆精食月食之既天地皆幽昏使我增永愾墨水仙二妃泣蒼梧淚多衣袂黑猶似不忘君垂頭情脈脈旅吟故居拋水石客路厭風霜衰鬢從教短餘生不願長逆旅新寒入荒林敗葉飛鄉心空自動衰病不能歸題竹軒窗前有修竹道人心自足清風入詩腸何用五鼎肉種菊種菊東籬下悠然寄隱情不辭頻抱甕他日要餐英厭雨連宵雨如瀉老耳瞶不聞曉澗已流衍山川猶出雲觀心坐石夜觀心心明亡衆覆一沼水涵秋千山月如畫七言絶句即事偶被鳥聲驚破夢無心行到黃龍洞道人巳擊晚香鐘猶有殘陽在髙棟晚歸喬林瑟瑟起隂風夜色歸山不辨重唯有隱廬偏易認石樓燈火最深峯夜禪巖房靜坐夜方中無相無緣智境融未始將心空萬法曽知萬法本來空江邊送人之衡陽二月江頭送客船絲絲楊栁散晴煙生來未識衡陽路安得相思有夢傳即景青山隴麥與人齊莓子花開謝豹啼牛背牧兒心最樂緩吹桐角過前溪懷友客路東西又晚秋相思空上水邊樓嫌他新鴈無情煞不帶書來只帶愁舟行小艇悠揚只信風岸邉霜葉似花紅不同雪夜尋安道儂自看山到剡中艇子歸來月未升汀洲宛轉夕煙凝熒熒一點垂楊下知是漁人結網燈清明客路驅馳足自憐壯懷消歇在花先暖床寂寞聽風雨孤負清明又一年春感一年春色巳摧殘水滿陂塘草樹寒轉覺歸愁消不得杜鵑聲裏淚闌干為鄞僧題四明窗郡名元自山名得石似疏櫺四面同每恨世人逰不到羡君身在此山中赤城病起客裏厭厭病過秋重陽失作雁山遊起來忽見丹楓樹又是思歸一種愁采藥徑採藥歸來迹已陳真風千古蛻凡塵細看舊徑青青草猶是仙人醉裏春鴈山靈峯寺謝公嶺下靈峯寺諾詎羅曾向此居入洞不知歸寺路亂峯相倚上空虛遊衢州烏石山觀僧房畫山水苔徑髙低草樹寒雲從隨處有飛湍山中老宿居來熟却畫他山水石看夢覺岞崿東邉舊草堂久拋日日費思量夢中分曉曽歸去覺後身仍在異鄉秋日過子陵釣臺不將華衮換羊裘冷對青山到白頭説與往來名利客經過臺下莫維舟蕭阜水仙花江妃楚楚大江湄玉冷金寒醉不歸待得天風吹夢醒露香清透緑雲衣送兄龍井山中楓葉愁古塘橋外送行舟明朝相憶在何處孤鴈呌霜人白頭征婦詞第一傷心是别離别來三度寄征衣更嫌春夢無慿凖夢裏言歸又不歸夜泊暫向江邉泊夜舟忽聞吹笛水邉樓笛聲可解生愁思自是離人有許愁送人淡淡煙波南浦春臨流揮手易沾巾啼鵑不解留歸客岸栁偏能送去人暫時相見還相别别恨多於未見時明日新安江上去春風波浪不相知錦屏山圖錦屏山勢舞雙鸞影入嘉陵江水寒人在東南歸未得時時獨展畫圖看孤鴈萬里孤飛羽翼殘一聲時復呌雲寒江湖羣侣今難得隨處煙波且自安夢回夢回四壁無人語髙樹蕭蕭似有風獨起繞池行數匝萬山擎雪月明中思逺人四方四首娟娟秋月照空床行人東征未還鄉思如轆轤不斷絶千轉萬轉縈愁腸念郎南行在桂林蠻風瘴雨衆毒侵室家團欒第一樂願郎早歸無久淫草間小蟲鳴素秋喚起妾身離别愁愁多宛轉結成夢夢逺直過西涼州幽燕地冷無春暉此時道歸郎不歸今朝朔風欺逺客又還無處寄寒衣東西二眺千古江山歸雅量猶今二眺有遺蹤要知當日經綸志問取丹崖幾樹松嘲蝶耳聲眼色總非真物我同為一窖塵蝴蝶不知身是夢花間栩栩過青春獨客嘖嘖隂蟲鳴不巳獨客無悰夜中起迢遙星漢正西流千峯浸月清如水贈日者雲谷俞喜十載唯耕谷口雲倚鉏時復看天文世間貴賤君皆識却恐無人解識君客身猶卧玲瓏石鄉夢長懸岞崿山詹尹自應知我意為言何日定當還春日野外春波蕩漾滿方塘春草無名各自長沙際漁翁偏自在醉拋蓑笠卧斜陽欹枕徹底清間住草堂更無一事可商量時時欹枕寒窗下靜看西山白鷺行傷感百萬長驅入戰塵幾人能保去時身古來戰將知多少盡作青青塞草春樵隱歸隱青山嵗月多定知無意出煙蘿樵風自是仙家事更莫看棋爛斧柯懷故鄉家住潛溪雲萬里别來四十九春風無田種秫不歸去夢落山光水色中聞鴈山寒徑月斷人行孤鴈噰噰忽一聲身在異鄉兄弟盡老夫那得易為情重雲散盡天如鏡寒鴈哭霜冬夜永欲寫相思寄逺人翩翩過盡無留影垂老垂老飄零兩鬢華重陽又復對黃花明年決定謀歸去免使禽猿有怨嗟雪晴日照松頭凍雪崩又聞烘折小池氷起看門外羣峯色絶頂才分翠一稜曉鐘夢覺風吹雨腳斷庵西斜月透疏松披衣起坐不成寐細聽四山鳴曉鐘香林洞口觀猿貴遊拋果引羣狙大小玄黃趕擲殊别有白猿歸洞裏一生不受俗人呼村行與田翁語門對荒陂栁半遮老翁留客坐枯槎自言雨足好苖色猶恐風多損稻花贈仙翁九曲溪連萬樹松樹邉雲屋住仙翁不曽説著人間事日暮唯先閉鶴籠西風西風似識野夫心吹葉填門日漸深童子切須休掃著要他朝夕助秋吟西風飋飋起松林捲盡長空萬里隂明月在天天似水似余一片坐禪心邊思十年辛苦戍邉城朔漠漫漫萬里平厭聽五更吹曉角聲聲都是斷腸聲朔鴈南翔已盡回閨中不見寄書來窮荒二月無青草長對東風賦七哀愛秋宋玉悲秋我愛秋清秋行樂勝春逰林疏盡見山中石更有寒泉帶石流夜深四山古木變精靈聞得相呼來聽經夜深經罷各分散燈火滿林如亂星昨夜昨夜三更風作惡墮林橡栗如飛雹山童清曉問禪翁翁在定中都不覺重逢故人不見生公四十秋中間多少别離愁重逢寧用傷頭白難得相看盡白頭竺山中夜天漢無雲星宿稀夜涼清露濕山衣月明照我孤禪影亦照松頭野鶴飛書懷寢時忘夢覺忘形惟覺無心最可慿祗作秋空雲一片任教乘化自消凝
