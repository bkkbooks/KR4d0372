body:
  text: 潛山集卷九宋釋文珦撰五言律農父農家逢樂歲歡笑自村村牟麥黃鋪野桑麻緑映門簄梁收鰋鯉圈柵足雞豚古廟髙楓下迎神鼓笛喧暮春書懷青春還又暮草樹各相髙細雨啼姑惡微風飛伯勞壯懷消白髮隱跡寄𤣥袍萬事何須計人生各有遭懶出年衰常懶出經歲坐衡茅適俗無新韻因貧失故交厨空鳴蟋蟀簷靜落蠨蛸獨有吟詩癖如今亦盡拋衡茅衡茅隱翠層聊以盡殘形得性非常道忘言是此經孤標松落落晚節竹青青此外非吾事來言總不聽偃息偃息冷雲邊悠然白已𤣥動時皆物役靜處是吾天虛牖延蘿月連筒引竹泉心期終不出就此了餘年息影息影塵埃表安心靜默間若為消白日長是對青山流水欲窮處野猿相與還孤雲時起滅未必似余閒秋日禪房絶巘秋光裏禪房夜氣清天風吹鶴夢山月照猿聲性懶諸緣絶身閒四體輕生來自蕭散不是彊遺名農户農户竹林西茅簷傍水低黃雞四五隻青薤兩三畦社甕醅堪漉秋田秫又齊老翁留客住為具任山妻農居農居深且僻城市不相聞草路縱橫入柴門向背分兒童知放牧父老念耕耘但願桑麻長勤勞豈足云山房山房孟冬月獨坐對殘缸侍者嫌貧去詩魔以靜降霜威寒透衲月色碎穿窗萬法皆非侣令人憶老龎空中空中填至理彼我兩俱忘自有心如鐵寧嫌鬢似霜清泉隨澗逺古屋入雲長此是吾安處陶然樂未央物我物我兩俱忘隤然入道鄉空為真命脉靜是悟肝腸竹月光零亂松風韻短長色聲皆妙契曾不費思量樗櫟樗櫟非時用悠悠任散材自歸孤嶂下已是十年來世慮消除盡閒門少得開相過但清話懶不置茶杯身老身老心仍懶深棲樂此園飲氷難變節卧雪不開門八尺藜牀軟三重紙被溫傷懷惟一事凍破石陶尊吾心吾心偏向靜物外寄柴荆山意深方好溪源逺自清餘生惟缺死衆慮已皆平隱者宜無迹人休問姓名夜氣夜氣正冥冥閒人夢已醒上方風磬斷小室雨燈青照鏡諸心靜忘緣四體寧勝他名利客騎馬戴寒星老人老人方外人觀物又觀身得性無今古隨時亦故新梅容微笑臘栁意暗藏春除是同懷者知豫此語真永晝永晝絶將迎禪房似水清可曽留長物頗以厭虛名日正樓無影風回樹有聲吟章久不弄今日偶然成為商隱賦篔房斯篔非俗本清韻古今同渭上曾千畝房邊又一叢月生金散亂風過玉玲瓏徑節尤宜晚青青雨露中一身一身誰與偕病骨老窮崖春雨苔封徑秋風葉滿階翦雲成隱服煮石當清齊樵客時相過言豫有好懷山園叢桂新蘖將抽陳葉皆隕感而成詠草木隨時變由來不少停新萌將欲吐陳葉已先零便可知浮世無由固此形保常同醉夢曾有幾人醒室空室空無侍者坐卧一團蒲但見朝還暮焉知榮與枯山心便寂寞天籟聽喁于雲外幽人好時來問老夫晨步茅堂清潄罷隨意涉西陵茅屋氷千柱髙峰雪一稜水渾潮已長霞淡日初升更欲過前浦漁舟喚不譍調琴羣動夜中息霜清月滿林野僧無俗事幽興寄瑶琴淡淡思歸操悠悠太古心希聲在自得不必為知音郊行陋室隨緣住空山信意行何須稱隱逸且復謝將迎古木青猿性孤烟白鳥程由來各有適豈必用浮名乘興乘興不拘程悠悠任意行小溪橫木渡何寺逺鐘聲野菜抽心起山花照眼明幽禽亦堪愛多解自呼名歸來世變今如此吾心復背時皇皇無所與去去欲何之獨木橋難渡三乂路可疑歸來差自好猿鶴舊相知夜讀太𤣥虛室冷雲邊消閒讀太𤣥未須求甚解聊復竟餘篇夜永殘膏薄天高列宿懸有蓍還懶揲休咎已俱捐年來年來已絶交孤憩竹間寮境寂身逾懶神安息自調雲開山意靜風止樹聲消自足全無樂誰能問市朝世路世路古來難深居息萬端道因無欲勝山不厭人看石碓寒流淺畬田逺燒殘未嫌生意少老子自能安臘月立春雪後溪行偶作踽踽白頭人江湖寡所親故鄉千里念閏歲兩番春北雪歌黃竹東風變緑蘋此中來往熟不問自知津春日病起暮景交朋盡何人問死生卧於蝸室底看得鵲巢成緣絶門常靜心空疾漸平又思扶杖出溪上聽泉聲朽質朽質任浮沉都無住著心未憑三窟兔得似九臯禽煮石清泉潔眠雲翠壁深生來有詩癖老去亦忘吟梅柟梅柟三四樹手種近巖房始見條抽緑俄驚葉隕黃物情殊易變身世豈能常且盡修心法休傳却死方地僻地僻鄰居少蕭條獨掩關還因萬事拙分得一生閒野水皆歸壑孤雲不離山白鷗知我性渾不怪疏頑堪歎堪歎是衰年年年白髮添客身窮鬼狎古道俗人嫌當作凌霄鶴休為上竹鮎到頭歸去好秖合效陶潛忘已身榮如美疢身退是良方雲月皆成趣悲歡不入腸間門清晝永宴坐緑陰涼昔者惟忘物今焉已亦忘山林古松古松形甚怪得性在山林偃蓋盤空老流脂入地深青霜曾換骨野火誤燒心材太誠難用良工亦漫尋閒房閒房近竺岑四面是清陰涉物皆成趣無因廢得吟蛇蟠枯樹腹雀乳古亭心倘或遊人見猶疑隱缺深幽步僻好唯泉石深居任草萊寧辭幽步逺且放好懷開緑樹鶯求友青坡雉應媒因逢道人語月出始能回晚步秋色遍西原行吟野興存坂田通堰熟溪水度灘喧宿鳥分投樹歸牛各認村幽居乘夜返松月在衡門賡李篔房韻故國頻關夢春深一到來却因風景異便棹雨舟回其可忘諸夏真堪賦七哀天居曾入處滿目是寒苔曝背老知身是患萬事不關心曝背茅簷下孤猿時一吟白雲同去住青壁共幽深小嶺尤堪隱難尋支道林焙茶異荈雲邊得山房手自烘頗思同陸羽全覺似盧同孤閲當先破仙靈更可通蓬萊知逺近我欲便乘風秋夜月下獨吟看月倚修桐寥寥夜正中西郊金氣肅南陸火雲空繞樹徒憐鵲傳書未有鴻浩歌誰與和禪意自相通秋懷寂寥誰共語白髮對寒流往事渾疑夢餘生秖似浮青蟲鳴向夕𤣥鳥去因秋故友滄江外茫茫不可求種植種植有良法曾聞老圃辭靈苖如已茂惡草自然萎根本須培養生枯勿顧思修身亦如此於理足堪推閒居影不落人間空門斷往還心如灰已死身與石同頑洗耳清㪺瀑搘笻靜對山老僧閒甚富誰欲賈豫閒荒徑荒徑入林微蓬廬客到稀苔痕侵藥褁山色冷吟衣蚯蚓耕泥起蜻蜓㸃水飛坐來忘萬事靜看宿雲歸幽徑任蓬蒿衡門閉亦牢駒寒宜在谷鶴倦懶鳴皋老樹根流髓重崖石長膏樵童更閒靜聽我讀離騷深居湖海同流盡深居獨繫匏已全忘疏鈔亦不事推敲水石為清供烟霞作淡交隨行一枝錫高掛在松梢孤踪孤踪不擇地陵上即安陵聊自存吾道其他無異能禪衣皆芰製齊鉢但藜蒸更喜交游絶閒房冷似氷嘉况嘉况日因仍山翁樂豈勝自知梅已熟人報麥初登外患忘饑渴中心散滯凝超然出天地不止似壺氷喜故人來訪共論易讀書無與娛日夕友猿狙喜恱深交至參同未畫初語邊驚鬼魅句裏得真儒兹事忘來久因君又起豫螢火爾質非天賦唯從腐草生細微曾未覺變化亦難明自照光寧逺羣飛體更輕空教征戍婦容易動離情自愛衣裳唯毳衲飲啄祇簞瓢翻為生涯薄能令世慮消寒花香不逺病木葉先凋自愛秋風裏雲山共寂寥梅雨梅雨無時下霖淫一月餘重陰迷早晚常課廢經書衣潤無由曝園荒亦缺鋤堯天舜日逺懷抱若為舒世外世外多幽勝塵樊豈足云泉聲長似樂山氣自成雲觀象知羲易安禪悟竺墳貴交休見憶已與鹿麋羣物外物外煙霞古幽深斷送迎瞶僧唯反聽啼鳥自春聲望嶽山心靜臨池水觀成豈知趨世者終日但營營惜别風濤晚未止鼓枻欲何之稚齒便相識暮年成别離水香浮浦樹月露滿江蘺明日空凝佇茫茫無處期哀理樗散樗散本靈種根於廣莫鄉繁陰深雨露怪節老風霜幸自忘封植何須較短長世交多未逹為子重悲傷哀梅麓樓寺丞散逸羲皇上風流晉宋間金蓮推寓直玉筍竟虛班名在方為重身榮等是閒知心千古月耿耿照泉關道與時人背多因得所深文章千古印忠孝一生心棘冷難承澤梅殘秖在林空門翻有淚斷斷是知音寄酒全清逹論交不世情逺猷期變俗直氣反傷生屬纊無妻子營墳尚弟兄九原那可作腸斷買山盟詠梅戲效晚唐體古今人共愛不獨是林逋樹老枝方怪花開葉已無月中香冷淡雪後意清孤長憶山房外臨溪有一株辛巳仲冬二日冬至孟冬晦日偶成天地一陰陽推遷見短長後朝方反復此月謾稱良萍梗餘浮迹桑榆借晚光有龜還懶卜唯覺好支牀駸駸近一陽晝短夜偏長打睡工夫到潛踪計策良曉霜寒有力冬日淡無光生怕人相覔衰翁懶下牀歲盡雲深路不通獨處歲還窮盡斷塵勞念方成隱遁功松疏斜漏日竹徑老吟風不是遺名者何由到此中地偏地偏人到稀倦客老柴扉屈指同遊盡回頭萬事違石泉清夢枕山月冷禪衣身與孤雲合無心自在飛靜地適時非所長靜地閲流光舊燕無留影新鴻有斷行交朋皆謝往老大足悲傷彊詠多羞澀追思亦易忘山居冬日懶隨冬日栁獨許歲寒松無復芳菲意深棲雲外峰病身寒易縮老衲澀難縫却喜同懷者時來問隱踪傳聲問我問我是何人空門舊隱淪因知身世假養得性情真短景將沉照枯株不受春古來黃綺輩亦復懶稱臣野草花心愛無名草閒花取次開自能追造化渾不假栽培姚魏傷攀折楩柟困剪裁秖因非世用長得保根荄放浪放浪一虛舟江湖七十秋見聞遺耳目生死付浮休寧有機心在唯同造物游脫然人境外無喜亦無憂幽懷野僧如野鹿畏下白雲層遲暮知身幻疏慵奈世憎烟埋秋徑竹風閃夜堂燈萬事何須問幽懷自可慿曉别故人别日不易數相逢多故情為吾留一宿同子話三生月印秋燈白霜添夜氣清晨鐘緣底事還又動離聲感舊山川雖不改傷感自難窮野樹浮新緑宫花隕舊紅兩間無異氣一等是春風萬古乘除理誰能究始終不出飢寒驅不出忍死住空山芰製幾回補荆扉終歲關是非塵外逺雲月句中閒此意難名道存諸靜默間雪霽别鄉雪霽别鄉關經行百里間溪流殊蕩漾山色正斕斒民散無多户程途轉幾灣衰齡垂八十未必又重還吟意朝吟暮亦吟吟意在山林往事皆如夢餘生已死心白雲閒到底黃葉積來深此是吾安處人休笑陸沉閉户閉户秋風裏寥寥絶往還菊開無俗豔木落見真山心比孤蟾淨身同野鹿閒困來雖就枕無夢到人間九日吟又過一畨秋秋應笑白頭任教花自笑其奈我忘憂未死聊游戲才亡即罷休應知皆是幻盡底付悠悠
