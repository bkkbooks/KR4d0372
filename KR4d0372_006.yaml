body:
  text: 潛山集卷六宋釋文珦撰五言律送林弓寮歸閩省覲竹溪中書往赴安溪縣新任當展經綸志初為撫字官五絃能自愛百里幾民安此去還家便知非行路難蒍于歌一曲先合盡親歡别我重雲裏揚舲積雨餘預愁千里道難寄一緘書暫爾還溪館重來任石渠明朝謾凝睇舟已過桐廬初三夜月新月似蛾眉娟娟止片時輝光雖有缺輪郭未曽虧三五還應滿尋常那得知人生亦如此窮達信難期懷隱者逸步脫譏讒髙蹤不混凡獨甘巢絶谷人似說遊巖自製幽人筆妻裁隱士衫世交空見憶無處寄書函送趙一嚴守永嘉九重思共理符竹付更生卿月輝麟譜文星次鹿城精微敷易教信厚播詩聲好使中川水長流不盡清送兵部兄出守髙安君是甲科人文章已立身逺邦迎父母天闕動星辰行愛三冬日到為千里春如將致吾后先要惜斯民雲門六寺即唐靈徹師舊隱吟遍唐人句𤣥蹤不易攀一溪清到郭諸寺各依山暮雨松花老秋風藥井間唯應千歲後華表鶴飛還題暇亭王子敬云在山陰道中使人應接不暇今以暇名蓋反騷也人與山同靜亭安紫翠間無時臨鏡水終日見南山子敬心猶雜淵明意自間坐來輕世事薄暮鳥飛還日鑄山中阻雪來訪幽人宿春風未變和水聲依澗逺雪意向山多坡竹摧新粉庭杉失舊柯山童曉相報鹿跡夜曽過客居阻雪客居還歲暮風雪掩柴扉人向行中老鄉從夢裏歸繁聲交澗竹餘冷入山衣消遣憑詩句猶慚未入微新昌南巖大禹未疏鑿此山為海門試從樵徑上猶有釣車存佛屋棲靈竇仙墳蔭逺村巖頭一滴水居者不知源宿山庵絶頂一庵孤悠悠清夜徂野僧寒出定山鬼暗相呼泉落池應滿雲深樹欲無何年捐萬事來此共跏趺野祠翁媪已相催喧喧鼓笛來荒祠三面水老樹一身苔休咎馮巫語凶豐信珓杯神前釃酒罷風散紙錢灰和人晚秋客思雙轂苦難留江城又晚秋故鄉難寄訊倦客獨登樓衰草重重恨征鴻字字愁漁翁却蕭散吹笛過前洲節物節物苦驚人那堪逺客身梅心輕送臘栁意轉隨春叢薄啼新鳥深泉動蟄鱗獨憐歸夢短不得面慈親姚江舟中夢故人勸歸一舸寒江上蕭蕭兩鬢華不唯傷道路終恐委泥沙宿雨添山靄秋風起浪花故人應念我夢裏勸還家鄞中他山堰碧浸他山古梅梁昔化龍江溪一堰隔禾黍四郊重絶唱思幽客歡聲遍野農長官功不朽遺廟合歌鐘漁父在處變名姓往來長嘯歌一身無賦役幾口共烟波江月垂綸下汀雲宿棹和却應嫌渭叟老去脫寒蓑忠文洪相公挽辭間氣鍾河嶽深衷悟冕旒雄文驚萬古徑節凜髙秋清廟絃何絶明堂柱不留我生䝉許與灑淚莫能休盛德歸冥寞斯文轉寂寥聲名昭信史功業在清朝遺表祈天切忠魂入地遙九重思亮直應作楚辭招水亭舒眺秋風水上亭獨坐望郊坰佛寺山偏好漁家地亦腥桑枯因抱蝎草腐自生螢踏月歸林下柴扉尚未扄鄞中桃花渡即事城北桃花渡樓居半海商官河通逺浦津樹雜髙檣旭日江烟暖東風水草香為看風土異客子又懷鄉自鄞江東泛舟至黃山橋度嶺遊白雲寺望望白雲居崔嵬在碧虛水窮方度嶺石峻不容車舊愛松蘿頂重來筍蕨餘却憐清絶景無地著吟廬建溪青玉峽雲際寺飛瀑掛晴霓山門對小溪曉行青玉峽時聽白猿啼野竹樊蕉徑修桐間茗畦儻容分席地便此卜幽棲石橋瀑布瀑布依真境何曽與世同灑空輕作霧濺石亂生風絶壁驚飛鳥危梁卧斷虹人言龍窟宅祇在此潭中九仙山中瀑一水從天下源深不可知千尋垂縞練餘沫散珠璣響激雷霆合風生草木欹老僧來灌頂濺濕薜蘿衣雙溪寺復嶺又重岡塵緣此地忘五峰朝寺古雙澗出雲長深靜宜棲隱髙寒易雪霜擬登華頂去幽徑旋鋤荒煙霞石屋諸寺緣山一徑微竹樹隱禪扉雲絶去來性僧無生滅機風簷鐵自語陰洞石能飛終擬擕瓶錫他年向此歸溪寺書懷野寺依溪曲長橋接栁堤俗人忙不入孤客自安棲懶散今成性煙雲盡入題鄰居有農父時與話耕犂宿閩中溪寺獨宿閩溪寺中宵夢自驚月斜移樹影風急轉灘聲起對清秋色難為逺客情雲山千萬疊何處是神京送友人住海寺海上蓮花國初從太守招衣傳方石偈舟泊丈亭潮漁子應焚簄鮫人擬獻綃他時思舊社無奈寄書遙山寺古寺氛埃表幽程屈曲通髙峰常似雨陰壑易生風架棧為平地寒鐘出半空他年依老宿掛錫此山中出城行半日始得到招提山氣隨時變州形入望低地靈多産藥村逺不聞雞詰旦還離此尋幽過别溪閩中歲暮懷吳中冉冉年光盡悽悽客思驚疏狂輕萬事行役負平生海月移松影山風壯瀑聲寒宵頻作夢曽不離吳城懷安養淨土雖周遍標方必在西一心無彼此九品自髙低久别情無奈重歸路不迷依憑法藏願名字欲先題惟吾與西佛天性本相關怊悵迷方久浮沉苦海間三心終不退上輩必容攀慈念應尤切提攜早共還容易拋鄉國漂流幾歲年癡兒竟何事慈父必興憐客泪東風裏歸心落日邊如今定當返業已具西船西方清泰國元自是吾家寶樹千般樂金池四色花同遊諸伴侣一别幾年華有意重歸去途程本不賖春日懷人林嶺春雲滿陂湖春水多舊鄉書不到久客意如何老去長牢落悲來一嘯歌故人今在否相憶夢青蘿贈隱人換却青雲志髙眠舊隱廬閒門誰踐草隙地自栽蔬交道貧尤密吟情老不疏囊中何所有一卷養生書七里灘别友斷壁青松古空江翠靄多行人幾回老漁父祇髙歌縱有重逢約其如此别何明朝重回首惆悵隔烟波湖亭别友與君俱是客重别意如何斜日孤帆去寒江風浪多逺懷隨鴈影新詠雜漁歌知此遨遊地何時復共過江上與故人暫㑹復别交朋似君少淡泊自真宗不記何年别翻驚此地逢烟波涵暮景霜露改秋容又說天台去天台千萬峰池上别友人今朝攜手處髙榭俯風漪正爾俱衰暮寧堪又别離栁長深映馬荷弱未勝龜它日遙相憶還應話此時贈王門老賔客薄俗謾紛紛焉知贋與真空餘千里馬難覔九方歅古道何當復時風未易陳王門舊賔客懷舊重悲辛孤客衆人皆汲汲孤客自俞俞方外居來久囊中物盡無行將笻作伴講以石為徒若問何宗㫖饑來飯一盂除狹世狹難紆轡全生託散財紛華因地遣懷抱向山開野祭鴉爭聚貧居燕亦來不知江上笛何事有餘哀題顔晞仲歸隱飄然攜杖錫歸隱故山中鳥道雲泉逺猿聲烟樹重清間銷不盡塵纍坐來空早晚須相覔知居若箇峰行石林蒼莽間頗多幽致有思歸隱離城才一舍已得近樵漁秀石雲松路荒籬水竹居陽坡收早粟燒地長新蔬便好為兹隱吾生不願餘看月靜室焚香罷間吟倚石欄忽從青玉峽湧出白銀盤列宿消芒盡清暉照膽寒終宵不成寐二十四回看尋北山友不值山南山北住來往共煙霞午徑行松葉秋籬問菊花叩門人不見歸路日西斜應是孤雲性難教只在家旱雨驟雨幡然下風雷駕疾威烏兼巢穴墮龍挾水雲飛物象回生意神功解旱圍田間喜相語㸃㸃勝珠璣三術利祿與名稱拘囚豈易勝由來立仗馬有愧脫鞲鷹達者知求解貪夫反自矜吾方用三術止觀足堪憑山夜山氣夜沉沉泉流石澗陰虛廊羣動息寒殿一燈深潔白孤蟾影清澄野客心興來歌古調風動古松林閒樂祇以閒為樂寧論是與非安身唯草座終歲掩柴扉水蓏收菱芡山糧采蕨薇幾回清夢去還共白雲飛題規無範雲深室物外清虛境由來逺衆紛靈蹤幾年說梵放或時聞似有似無路漫山漫谷雲自難容俗駕曽不待移文飛來峰猿恐山還欲去著爾慰山靈掛處頻分影吟時不見形鷲峰愁外逺巴峽夢中青月下三聲苦幽人却要聽禁體詠雪應臘雨去聲連朝豐年瑞已饒亂聲還蔌蔌猛勢尚瀌瀌嶺嶠松增秀原田麥長臕窮閻休怨冷見晛自應消禁體詠雪時方用兵故其末及之擁衲坐深更頻聞蔌蔌聲祇疑為落葉不道是飛霙曉壓松頭重寒鋪砌面平幸成豐歲兆何事却徵兵地逺地逺無人迹心閒見物情洞中飛石燕崖頂住山精仙木開花異靈泉吐溜清幽棲已成趣不復問浮名地逺隔凡塵因而此隱淪閒知雲意度清愛水精神蔬食聊充腹麻衣足蔽身休嫌吾懶拙懶拙乃吾真送逺離情不可說握手更躊躇為客三秋盡還家千里餘山程楓葉赤水驛柳條疏日夕空林下何人伴索居吾性吾性本疏狂難教住帝鄉看心忘世界濯足愛滄浪往事皆如夢浮生底用忙到頭華衮服不及芰荷裳愛性愛性畏歡呶雲深一徑茅了無徒屬纍唯結鹿麋交灌木由來古修篁亦漸苞終然聲利表頗若類由巢懶性懶性難趨世深棲自養䝉得閒真可樂未死已知空陰壑長留雪喬林易有風見聞今又絶眼暗耳全聾野性野性難諧俗空林自葺茅且教同木石不是慕夷巢竹樹長陰合風泉夜響交山中無小草那許世人嘲詠苕霅苕霅水烟鄉溪風六月涼家家有船步日日聽魚桹柳樹垂陰密薲花入夢香山人心亦愛時到詠滄浪訪山家山翁居處僻野屋蓋茅新自得烟霞趣應無車馬塵怪禽啼似鬼古木變為人不是忘緣者誰能與子親送王逸人閒身如野鶴天地一虛巢山水琴中趣松筠世外交懷親逢逺信開卦卜歸爻更說雲門好相期共結茅送立上人偕沈東臯謁吳退菴闔閭城裏去瘦沈是同舟不用悲遊鹿唯須問狎鷗夕陽空茂苑殘雪遍長洲太守相逢日言詩定㸃頭送王商公遊永嘉兼呈東甽曹侍郎荆山劉學士覔句東嘉去春風草又薰一千餘里路四十九盤雲幸有江山助休為旅泊分曹劉諸老在為我致殷勤旅中秋晚秋露洗晴空秋光處處同楓霞明野樹蘆雪覆沙叢旅況悲寒蛬歸心寄斷鴻幾時隨牧豎吹笛亂山中桐廬縣瀟灑桐廬縣名聞漢代餘民風尚耕釣土物富薪蔬江水連衢港雲山帶越墟終期置茅屋鄰近釣臺居華亭縣地占三吳勝名因二陸雄海村宵見日江市晝多風商賈通倭舶樓臺半佛宫歸來千歲鶴應恨故巢空臨安縣霸業歸王室空城但黍苗溪隨山勢轉路入市聲遙故俗多征斂遺民尚寂寥傷心到今古祠樹亦蕭蕭秋聲商颷何厲疾羣籟盡囂囂回穴生崖谷淜滂度泬寥恍疑沙漠戰誤聽浙江潮遮莫頻相聒羇魂易得消江上留滯有作寂寥誰與共華髮卧滄州月照空堂夕蛩吟壞壁秋故人稀問訊逺客易生愁安得如沙鳥煙波任去留秋江獨泛秋波無際逺短艇遡寒江風景由來異鄉心未易降晚烟生驛樹空翠撲船窗賦得滄浪曲長謡不便腔水鄉聞鴈短景又還暮羇愁那易禁半生無著莫萬事任浮沉衲敝蘆花冷爐存葑火深雲間斷行鴈時復動哀吟孤雁孤雁如貞婦餘生不再雙避寒辭北塞隨日到南邦倦翼堪憐影哀音自滿腔空閨人聽得離思轉難降秋感客中難度日池上獨徘徊露冷芙蕖死天高鴻雁來枯莖寧再潤羣呌易成哀對此能無感吾親在夜臺歸夢幾歲逺辭家勞生詎有涯客居終不穩詩鬢獨先華掃葉江風厲侵床山月斜念歸歸未得清夢入煙霞余九月三日忽病瘧日必一作肢體憊甚至十日隱几坐卧忽夢二人幅巾杖藜相過談詩及寤但記得一聨云骨換言方異心空意始圎是夕瘧止次夜又自夢坐亡手書遺偈四句前二句雖已書而不能記憶後二句云放身行碧落古樂聽鈞天書至落字而覺末句雖書未全而口尚能誦於是起就佛燈書之病遂脫然信詩之能愈瘧矣今足以起結成唐律一篇語不工以記異也吟是大乘禪禪深夢亦仙放身行碧落古樂聽鈞天骨換言方異心空意始圎手挼黃菊蕊寫放瀑崖邊春夜夢中得觀與心為度身將世作仇一聨既覺而足成四韻寄修觀者髙人持逺流淨行在林丘觀與心為度身將世作仇不曾過午食常滿六時修苦海人求度師應駕法舟清苕清曉泛苕濵長歌撥櫂頻山川開霽景草木暢餘春野老知閒趣沙鷗似故人絶勝拈塵尾駕說弊精神題竹房野水連苔徑山雲掩竹房人間清晝永鳥語緑陰涼斷刻排籖古新茶入焙香眼前清事足不道在殊方宿靈鷲瀾師房清泉繞砌流境界極深幽有客暫投宿羡君長此留詩成雲滿澗人靜月當樓忽聽清猿嘯南山山樹秋幽程幽程寧憚逺野外意無窮山叠髙低古川流宛轉通采芝隨羽客拾橡共狙公爛熳逰三日塵勞頓覺空隨寓我忘方就隱鳥倦自知還隨寓皆為道何人有此閒微茫春水渡平逺夕陽山盡入清吟景誰言勝事慳寄淮頭家兄君向淮堧去相思夢不安兵戈猶未定道路自應難曠野人煙少荒城鬼憐寒故園松菊在何必戀微官秋夜憶兄石房清睡熟猶擁黑貂裘鄉逺難為夢山深易得秋脊令空在詠蟋蟀暗生愁何日潜溪岸吟詩共倚樓哭何甥秀穎出儒林吾甥所得深良材竟難用造物果何心身後無遺育生前惜寸陰臨棺一悲咤萬籟亦同音邊思少年為逺戍兩鬢巳䰄䰄百戰功誰賞空閨信不來鄉關成夢境邊月是愁媒聽徹胡笳曲寒聲轉更哀春江夜泛江月照揚舲乘風過萬汀素光流逺漢髙浪濕寒星客恨消長笛閒身渺一蘋到京天未曙隱隱越山青反舌毛羽誠無取禽中號善鳴能將一片舌巧作百般聲元是因風氣曽非出性情君看五月後瘖默愧流鶯
