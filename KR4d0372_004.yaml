body:
  text: 潛山集卷四宋釋文珦撰五言古詩酬李漫翁暑中見寄韻羲娥不停轂催暑到茅屋萍蓬無地頭桑梓念天目古吟寓深情時事堪痛哭餘生竟何歸行已變陵谷篔房暑中寄詩依韻酬答溪翁若氷雪明淨不受涅經嵗斷知聞使我心苑結佳句來清風足以灑炎熱山中有竒事遲向秋深説依韻酬葛秋巖陶體四首山林自多趣况此晴和時我友賁然來相娛以琴詩倉庚遺好音薰風發清吹悠然與心會安能遽忘兹大化無端倪至道絶馮仗委身於一靜足以去羣妄死生亦寄耳遐齡豈吾望伯倫稱達人胡為未忘葬吾生一無營終日衡門下棲遲已成樂豈羡臺與榭相彼常汲汲而我獨多暇時聽蜾祝兒於以知物化東原風正和西山氣尤爽坐我於其中此心日以廣腰間豈須重眼下何必兩顔原陋巷居歌有金石響效陶四首用葛秋巖韻坐石滋南風幽抱和且衎志唯在山水身不關治亂終曲遂忘言舉目送飛翰所得皆天真初不加習玩山深自無暑五月草樹寒頗有遁世樂得之亦非難巖翁我同流邂逅成清歡回首功名人瑣瑣不足觀眼前幾富貴變滅同浮煙舉非吾所欽眷然思古先窮達無二道彭殤可齊年中心既昭徹萬象皆澄鮮我居本山林茅茨蔭嘉樹骯髒塵網間歸心自西騖吾駕今已返終然守貞素每思夜氣清起坐天未曙野翁野翁百不為白髮老巖澗寧肯慕膏粱且復飽藜莧故交非不多盡作風葉散餘生雖獨存反觀亦如幻山居答客問富貴有何好祗以勞其形吾居在山林四體常安寧寒緝沼中荷飢斸松下苓蒼苔沒幽徑白雲度疏櫺明月石上看清風枕間聽滅惑生智焰破塵出空經真如寐而寤亦若醉而醒此外非吾事眂之等浮萍誓不出籬户期以終頽齡君如不吾信重當問山靈遣興吾方慕孤貞俗苦尚馮附一身天地間瓠落如大瓠短寄無百年倐忽已遲暮平生清淨禪猶嫌被詩汚洗除豈誠難心空滅萬慮更當尋亮公竟入西山去寓形寓形宇宙間治身猶治木要在直而方母使圓且曲直方固違衆吾心以為是圓曲雖適時吾心以為恥人由圓曲富吾用直方貧吾心雖不移豫以書諸紳黃葉吾心愛黃葉不翅於南金九月秋風髙柴門積來深一一自掇拾書我白頭吟吟成意誰與拄頰對遙岑寄友分得客字夜來有清夢夢見山隂客宛然過蘭亭分吟坐苔石曉聞在湖寺揮塵論經席會面安可期相思春草碧吾生吾生少壯時窮力在經教一心融萬境頗亦能致效老來更脫略山水隨所樂今成信手碁勝負不復校人生幾何行人生能幾何百年三萬日一半睡中消餘夀或難必鐘鼎與軒裳總是牢籠物貪夫所甘心宛轉無由出富貴者常勞貧賤者常逸所以箕山人不為唐堯屈人生百年間何殊旅亭客少壯不可留漸覺衰老迫縱使功業成誰能免形役長歌歸去來山中煮白石冬日山中遣興始見迎秋氣又復換玄律寒山何蕭蕭飄風何弗弗雙丸遞隱見百齡信超忽慨念同遊人大半成異物吾年亦云衰逾六已望七不唯齒髮變舊間盡遺失死生無定據萬事難固必且以永今朝奚須計明日息影入山林曽不厭深密賢哉龎德公萬世稱隱逸重阜崔嵬行重阜何崔嵬遙瞻北邙路曠野無人居髙低盡丘墓不知古與新落落似棊布下有荒草叢上有白楊樹樹頂嘯鴟鳶草根穴狐兔嗟哉昔為人妻子相愛慕豈知易殂落到此長别處天地雖好生安能暫留駐夜臺杳冥冥千載竟不曙託身同草木坐受螻蟻蠧衣冠變成塵精靈自相語親戚不重過他人豈能顧聽我蒿里歌年命如朝露與雲耕重會復别久别思見面重逢反成悲相持問年紀各在桑榆時道途筋力殘玄髮成素絲時命茍不遭有才亦奚為榮華既非願但願亡寒飢眼前且相慰老别難再期此語亦良苦君心還自知别山中友人生貴適意窮達奚足論此意君能知方喜吾道存于心既莫逆彼此俱忘言胡為又當别誰能不消魂閉户閉户日無事山光滿盈几飯餘曲肱睡一覺頗酣美心平不作夢境寂如止水山童為煎茶茶熟我當起夜歸天氣殊清和山中多勝踐沿流采香芹穿雲得芳荈幽懷日以舒囂塵自兹遣乘月返茅茨倦足不復洗生唯淨命食持鉢向人境莫夜歸茅廬月出山愈靜處處聞泉聲行行踏松影洗足便安禪雲深石床冷煎茶吾生嗜苦茗春山恣攀緣采采不盈掬浥露殊芳鮮慮溷仙草性崕間取靈泉石鼎乃所宜灌濯手自煎擇火亦云至不令有微煙初沸碧雲聚再沸雪浪翻一碗復一碗盡啜袪憂煩良恐失正味緘默久不言須臾齒頰甘兩腋風颯然飄飄欲遐舉未下盧玉川芝田老師索余作松石因書此詩學畫同學書藝精人已老三年始向學一紙未能好墨淡石不蒼筆枯松亦稿芝翁索此圗遺笑應絶倒樗散樗散不任用居然老空林柴門絶車馬徑草三尺深靜對西山雲頗覺諧素心此外非所知誰言有華簪藤杖楖􅀈古藤杖偃蹇如虬龍伊昔訪隱人得之天柱峯視爾如良朋出處常相從渡水逾萬折穿雲或千重忽於風雨時狡獪誇靈蹤使我失馮倚瓠落無所容為顧美山賦五字田寶此五字田不羡千畝藉冥搜為播種發言皆黍稷梅山老吟農良已著深績終然乃有秋不負平生力湯婆野翁有湯婆愛逾美淑姬視之若彭亨虛中而無為冬日則飲湯身唯一衲隨曽不涴脂粉簡潔良易資終宵暖吾足貞靜無邪思德音之所同可作偕老期誓不中道絶若彼氓蚩蚩作詩以遺婆婆聽當勿疑讀郭文舉傳衆人務茍合達士羞雷同不可相為謀真成馬牛風我愛郭文舉乾坤一冥鴻送僧東歸今朝送君處草色如許新後會既難定别愁那易陳分手限吳越煙波渺無津雲山更重疊歸與何峯鄰慿人問消息或恐非其真不如早重來勿使山猿嗔祭坦仲履仲履真吾徒敏慧出流輩比玉無纎瑕方珠絶微纇子心如秋月皎皎長不昧子身如間雲出處極自在相從逾十年不見時俗態愛子靜而文喜子和而耐語子以玄微一一能領會今子隔重泉使我增感慨酌彼清澗泉為子供一酹魂氣誠有知歆監儼如對同友行山逢隱僧語我本忘世人有志在巖穴欣逢會心友提擕步林樾雲中野僧居樹梢清磬發不憚登陟勞遂得造石窟門前羃蘿蔦座後翳松栝結草為三衣降龍在一鉢問我從何來執手道契濶食我青精飯語我頗諄切教我去衆巧使我守一拙我誠服其言畢志不敢越他年定依止相與定晚節萬事盡棄捐飲澗茹薇蕨寄教西岑西岑我同流常惜會面疏秋深來舊京一嘗造君廬感君故情深館我於恬虛十日更倡酬間蹤頗虛邪人事那好乖扁舟賦歸與茫茫煙水隔無使堪寄書萬玉森篔簹孤峯麗芙蕖挂夢於其間栩栩復蘧蘧以我常思君知君亦思豫何時重携手使此苑結舒炙背老身不能寒心唯愛冬日炙背蓬門下暖氣浹肌骨自謂人間世此樂居第一雖曰狐貉溫功莫與之匹山居人不到獨坐快捫虱贈同志我本無生儔涉有乖素願百年直寄耳倐忽如過電猶記學語時老色遽滿面富貴非所希吾道在貧賤往事絶尋思殘生喜強健忘機有白鷗消日賴黃卷今辰扶杖出窮探不知倦與子偶相逢抵掌説嘉遁同歌紫芝曲共飽青精飯世人不相知心通亦何悶寄贈王子靜子靜野鹿性蕭散逃縶鞿倚詩以為田曽弗憂年飢詩腸有餘積詩貌無多肥朝吟暮亦吟吐屑常霏霏糟粕三百篇自能發天機兩腳走黃土頗若知音稀多時不相逢念爾魂夢飛何當抱詩來共食山中薇贈隱僧髙僧謝人世誅茅亂峯曲三衣不著蠶一飯長分鹿露滴秋徑松煙蒙曉窗竹真隱淡無營怡然心自足問李篔房疾篔翁非時流溫然古君子我雖異教人臭味略相似四月不見翁相望隔煙水石壇忽來前言翁乖攝理真體本無病請説病原委乃知為蒼生常欲致平治神明所扶持厥疾自衰已秋日定拏舟賀翁勿藥喜既為蒼生病須為蒼生起比夀於廣成與宋相終始重會馨桂山桂山吾友于壯嵗即相親跌宕去鞿縶出語必驚人倐爾罹世難東西各全身十年不相逢有若參與辰偶乘霅舟來見翁西澗濵相對恍如夢彼此白髮新抵掌話疇昔故情一何真遺我白雪章字字無埃塵長歌山水中鏗鈜驚鬼神胡為又當别繾綣難具陳風前一回首寒波渺無津他時定相思題詩附雙鱗日夕佳城市多溷濁溪山宜避喧山色日在門變態從朝昏悠然得之心真樂方自存此心誠不渝軒冕何足論放浪詩放浪遊名山山水悅人意窮日不知疲行行轉幽邃空籟如風聲竒峯似雲氣濯足就寒流憩錫投古寺長廊遇真僧妙語發清祕道我多隱情喜我無衆偽願言從此始萬事盡捐棄相從了餘生共踐真實地屏居屏居泉石間所樂在間縱山田與山果皆吾手自種禾穗巳垂穎粟包初拆縫一飽既可期肯復作詩用過野人居間人無外事飯餘聊散䇿路逢一老翁疑是避秦客招擕過别墅茅茨翳桑麥唯聞雞犬聲了無車馬迹自言入山來居然長兒息身將雲木親志與風塵隔屋邊種桃李無言花自拆原上耦耕人將非是沮溺遺世乃全真何為牽物役從此數相尋幽期竟難易酬清苕恭仲溫見寄舊詩追志於此吾生苦疏拙不解謀此身輾轉常寄食短褐如懸鶉徒御捨之去往往嫌我貧達交亦良多安能強相親唯有湖濵山於我如故人日夕與之對淡然忘主賔仲溫我同流道我此意真新詩逺相寄可以書諸紳何時到清苕相擕采白蘋送僧雲作達人性東西無定居重逢在京闕忽憶歸園廬水宿傍江市山行見樵車後期難重尋握手空躊躇吾身東西南北人寂寞住巖澗年衰鬢凝霜客久衣絶襻何須念粱肉且復飽藜莧猶患有吾身身死即無患趨時非好步步步青山歸眼界絶塵垢耳根遺是非充腸草木實被體雲霞衣吾貧豈當念吾願已無違林卧林卧嵗月久間襟頗孤清靜中觀庶類因之感豫情木伐以其材膏煎以其明獸檻以狡彯禽籠以音聲人茍矜智慮自械傷神形縱使功業崇或受鼎鑊烹今古無不然念之殊可驚世用常致患時棄乃全生所以箕潁客翛然竟遺名吾幸拙而愚冀可終餘齡曉坐夢破不成寐茅齋坐清曉他山已擊鐘獨樹初啼鳥四體既調柔衆境亦深窈素書未終軸朝光射林杪任性無外求一靜萬緣了何事塵中人百年徒擾擾冬日山居出門無所求藜杖常挂壁睡起日將午耳目有清適氷池坼寒光雪簷響清滴道人期不來獨看麻衣易山居自為山居人夢寐亦安佚頗謂龜六藏全勝兔三窟性中唯一真身外無餘物形謝即示已誰能問埋骨釣雪老漁彼漁者何人莫是滄浪叟萬頃自清心千山同白首忘世但垂綸得魚唯換酒醉後任扁舟流到湘川口贈别古道久淪喪世塗堪痛哭鸞鳳盡收聲豺虎方擇肉君從東方來求我山北谷君容一何臞我髮日已秃衰殘兩如此寧不感心目又還别我去後期難重卜握手臨路岐贈言以為祝一祝宜強飯二祝宜避俗秋日有懷故人山人出山去山鳥長相憶嵗月能幾何諸峯復秋色孤雲在何處煙水望不極怊悵多逺情飛鴻杳無迹屏居吾生本疏庸不作塵間夢屏居萬山中野性頗自縱消搖鷹脫鞲蕭散馬釋鞚天寒放麋入春燠聞鳥哢斸藥時荷鉏灌圃晨抱甕薇生富採擷橘熟斷包貢喬松已巢鶴瘦竹待鳴鳳回首視世人真若蟻一閧尋幽宿隱者居先生巢許流逺志在箕潁由來天機深遂使塵事屏雲霾山徑長草沒柴門靜相逢冬日暮共語寒夜永照暝然枯松漱泉㪺暗井虎嘯谷風生猿啼霜月冷潺湲瀑泉聲寒亂髙杉影藐焉豁塵襟頗若異人境明朝還别君尋幽過他嶺他日擬重來同采春山茗齒脫老齒皆脫落十中無二三存者一動搖咀嚼寧復堪荼薺均一咽盡略苦與甘世味非道腴正爾不欲耽老景日月如飛梭為我織老景蒼艾浸成色素絲颯垂領短長任所裁厚薄焉足省善賈亦徒施終然付泡影天目山僧隱居卜居就窮崖几席淨如泛三池更幽絶澄徹皆可鑑深處有蟠蛟逰子不敢瞰獨向月明時臨流學清梵滅迹滅迹巖岫間居然養真素夕餐籬菊英朝飲木蘭露玄衢諒堪涉時榮焉足慕萬古功名人纍纍但丘墓衰病衰病苦無悰偃仰以終日少間步東園愈使我心怵名芳掃迹空野草爭頭出無力事耘耛長吁返蓬室桂感桂非桃李儔露冷花始拆馨香枝可取欲以寄嘉客道逺莫能致徘徊終日夕别情因物感千里未嘗隔四皓皓首四老人獨見何明徹耻為暴秦汙商山永歸潔暫出正前星遄回卧松雪終令漢天子不敢亂適孽舒卷盡天機非徒上名節石室石室靜而深青山迭相映且無籠檻羈頗適猿鳥性外物俱棄捐內塵亦清淨人莫來扣門驚回老僧定深居深居在空間頗適靜者性門外無遊塵落葉滿荒徑陽光下西垂東嶺有餘映焚香讀楞伽唯許山鬼聽榮華不入夢於焉謝憂責深居三十年禽猿盡相識白日久知心孤雲本無迹丈室常寂然焚香自終夕哭立虛舟虛舟我良友生平快冥搜放迹江湖間自與造物遊憶昔仗短笻訪我竺峯頭貽我選體詩得法於曹劉因之與定盟有若膠漆投出處雖小殊夢寐常相求是乃以神交真如持逺儔有力負舟去迅速不少留易置於涼池亦善為舟謀我獨念故情涕淚如泉流些舟以此詩舟亦能聽不舟或不吾聽吾淚終難收今日今日天氣佳悠然動清興桑間椹初熟時復鳴戴勝同遊盡蕭散野徑亦幽敻仰面看青天長嘯山谷應間靜詞自從住山來未嘗離於山豫愛山之靜山亦多豫間間靜兩相得悠然真意存白雲乃知此難與躁者言裒集詩藁吾學本經論由之契無為書生習未忘有時或吟詩興到即有言長短信所施盡忘工與拙往往不修辭唯覺意頗真亦復無邪思事物皆寓爾又豈存肝脾老來欲消間裒集還自嗤聊以識吾過吾道不在兹
