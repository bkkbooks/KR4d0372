body:
  text: 潛山集卷二宋釋文珦撰五言古還山吾性本間曠素不喜城郭而况賓主間禮數相束縛悵望西南山佳氣日參錯逸興不可羈飄飄出籠鶴翩然曳杖還專意在一壑時方孟夏初衆花已零落櫧林晚雪香麥隴殘雲薄谷深絶遊塵苗田呌姑惡幽人舊相知一見心喜躍謂言舊山畬今猶可耕鑿日夕共登臨靡憚筋力弱於焉得天真畢志甘淡泊初非傲軒冕終又畏矰繳置身聲利場何如且行樂纍纍北原上萬古同寂寞仙佛辭仙以靜為道佛以空為宗羣動本皆靜萬有體恆空服食迷靜趣仙道不可從宴息昧空性佛理無由通或曰空靜殊斯言吾不庸空靜即仙佛得於此心中心乃佛仙質仙佛心之容三法妙而一吻焉歸大同深居深居謝交遊積葉任埋徑淡然忘所營為是疏懶性已達身本虛寧憂室垂罄時於泉石間信意成短詠于以寫吾情漁樵或相命一皆用其真魯魚事參訂猶不拘四聲豈復疑八病難入時人耳獨許山鬼聽生來妄想絶禪心本清淨斷不重出山此志實先定戍婦詞女蘿施松柏終始相因依結髮為婚姻偕老相與期夫今戍邊城賤妾無由隨行行日已逺何時定當歸但願崇勳業上報明主知諒君守恆節妾心終不移短歌行憶昨遊中林鳥鳴蘭蕙芳重來豈云久草木倏已黃乙鳥始辭去羣鴻復南翔天道有代謝人生安得常促促不我留譬如石火光紅顔日以瘁玄髮日以霜載念泉下人寧不增悲傷聆我短歌行歌短意則長竹下曉吟竹下坐清曉露氣沾裳衣樓鐘發清響山月耿餘輝心靜息欲無渺與萬物違莊周苦未達夢作蝴蝶飛先雲洲訪豫於萬玉歸而寄詩因用其韻曉行竺山心草露濡衣襟稽留雖在眼謝客難重尋靈木逾千齡斤斧日見侵侵伐殊未已使我老氣瘖雅樂寖不作滿耳侏離淫野性羞雷同自為梁父吟疵賤苦無力安能變夷音畏塗不可行林下甘陸沈世道已如此懷抱那易禁獨愛古桂林嵗晚猶森森此桂亦未保慨歎良又深靈雨靈雨應時至四野生新泉眢井久廢汲湛湛成深淵老農喜欲舞田苗緑如煙桔橰挂屋梁坦腹清晝眠雨後夜雨萬雷集漲水三尺深遊鱗得其所波間自浮沉科斗千點墨鯉鯽數寸金偶會濠梁意道人本無心古意難與時流道憂心常悄悄古道貴平易今人尚機巧好古而居今每飯不能飽來往無嫌猜唯知愛沙鳥逝水尚東流白日易西沒悠悠天地間二物何飄忽促迫於生人緑鬢成華髮昧者不自知終朝常汩汩利欲沈厥身其本已先蹶孰若繕真性以自固靈骨老梅何偃蹇雪時方始花自守嵗寒性不肯隨春華隱人適然見移植溪水涯瘦影無陽艷清香絶淫邪間靜如隱人隱人心所嘉樵牧無見侵以貽隱人嗟自昔真仙道恬淡而無為以之固靈根逺寄或可期秦皇與漢武縱欲不知疲既已長中國復欲威四夷其性忍而愎舉非仙者資天監常昭晰詎容肆謾欺不自省其衷妄冀茍得之所願竟無成徒為後人嗤天樂歌鳥樂在深林魚樂在深淵人樂在深居不深常致患吾居今己深柴門草樹間油然自成樂其樂難具言問吾樂伊何一皆得之天至樂任天與不知然而然朝樂暮亦樂此樂真具全吾歌天樂歌聽者慎勿喧夏雨應禱當夏而閔雨百神靡不宗精誠既上達所願神輒從觸石忽生雲初亦無多濃東風借其力斯須滿諸峯稍久彌六虛油油復溶溶炎歊化清涼密布難知重雷電發靈響潭湫起飛龍甘霔罔不周非止千里封稿苗浡然興連疇遂芃芃焚香拜天賜歡聲遍羣農當書大有年賦食皆足供公私有餘羡露積如崇墉誓言為酒醴報祀於秋冬降福宜孔皆萬國稱時雍感時厚地産桑榖為民衣食資井田取什一公私兩俱宜今者異古昔苛征常倍蓰倍蓰猶未厭泛索仍無時官因字民設胡為反害之盡以應上求民病莫能支織者恆苦寒耕者恆苦飢空村絶雞犬敗屋多流離白叟與我言其言乃如斯老夫為悲吟聞者當致思迂拙迂拙不任用於焉老雲耕曽非尚髙亢聊復辭送迎孤蹤類山鹿幽意存柴荆春薇擷初茁秋菊餐落英倦來唯宴默興到或遊行明目煙霞色清聽風泉聲萬象畢昭明四體常安平縱誕殊有適利祿非所榮外物遺天地真心齊死生但願絶知聞怡我間曠情拙叟拙叟百念無視身同木石有客問生涯笑指松與柏客言人之生當有資生策縱曰遺聲利其能去衣食松柏本無情於子知何益吾言子姑去吾倦將偃息反關據稿梧隤然竟終夕覺來寂無有雞呌東方白題醉翁圖所畫者誰子將非髙陽兒滿腹常貯酒何異於鴟夷陶陶以自樂禮法不可縻釀酒用老瓦漉酒脫接㒿寧復問升斗豈嘗辨醇醨終日但兀兀一巵掌中持頗謂有妙理非人所能知飲罷忘百慮袒跣行斜暉大笑沈湘人獨醒亦奚為山棲十載棲山楹影不入州縣地偏交易絶心間體逾健脫粟無宿儲壞衣多斷線人皆為吾憂吾樂未嘗變上下巖壑間幽賞不知倦一一全天真斷斷非飾緣西峯煉金客邂逅時相見談笑輒忘形殊亦諧素願古者賢達人道或在貧賤往躅良可循維以謹繾綣間居四體本虛空萬物猶土苴以此存內照頗覺非外假存亡楚人弓得失塞翁馬但使吾道存正欲知者寡蕭然謝塵境日夕心悠哉厨空無鼠雀徑僻多莓苔麻衣足自蔽柴門詎曾開坐聽風葉鳴疑有幽人來間人了無營偃臥常至午暖日到床前落葉滿籬户或時散幽步東岡復西塢誓此畢餘齡青山不相負雖貧常晏如兀兀坐山舍案有麻衣易門無俗士駕虞人不從招尼父亦待賈狗茍復蠅營此事吾不暇言交結交貴同心心同難間疏嘗聞膠漆固亦曰金蘭如君子要其終小人變厥初宜當作管鮑慎勿為耳餘又言交道交淡如水世交甘如醴結交當以真審交當以理道交似無情曾不異生死世稱刎頸交未必能終始君不見昔者陳餘與張耳野性野性樂疏曠從來厭風塵孤寒無所資屈身隨衆人貴遊棄疵賤不能強相親蹉跎三十年客路常清貧晚來歸山林麋鹿為我鄰萬事不挂意一一皆天真同流乃知此難與俗子陳白日苦短行白日常苦短無方使遲延始見出暘谷忽已沈虞淵迫促於生人無一能永年豐質成稿項鬒髮變華顛雞鳴逐聲利夜分未遑眠奄化同草木沒沒歸重泉或復自超放導引求神仙喬松在何許亦若茫昧然必當實根祇塵物皆棄捐德性貴純正文華在昭宣道與天地準萬古唯聖賢景行不可忘抒情為此篇有適破屋無兄弟拙者所棲息衡門未嘗啓聲利詎能迫資身不求備百事遂省力糞掃皆可衣草木皆可食春來有餘暇手種豆一席秋深葉黃隕霜莢漸開拆收歸籬落間早晚自剝擊藏之於瓶罌粒粒堪愛惜窮冬火爐頭時喚山猿喫猿去吾亦眠巖房愈幽寂口誦寒山詩頭枕麻衣易于以陶性情終然逺憂責頗謂貧非病更覺損勝益與其稱楩柟未若作樗櫟傍人莫相問老子方有適秋興秋雲滿茅屋秋風響楓林杖藜步幽徑落葉數寸深悠然拾葉歸寫我間中吟坐客興亦間彈入青瑶琴曲終各無語山水遺清音喜雪北風吹同雲慘淡日已夕枕上聞霰零須臾映窗白曉來籬户間平地忽過尺羣峯靜繚繞彌望無寸碧棲鳥噤不鳴空山斷行迹古木摧危梢荒崖失竒石瑞色遍天壤膏潤歸宿麥螟蟊深入地沴氣亦消釋豐年信可占豈復憂民食野老不知寒歡聲動阡陌聊作喜雪歌仰謝天鈞力歌長遣誰和寫寄西峯客感春忽聞春欲去園林謾遊矚輕風散餘紅細雨滋繁緑緑繁似歡榮紅散猶僇辱因悟人間世萬事易翻覆賤或登青雲貴或成赤族禍福無定端往往相倚伏那知今日歌不是明朝哭書以為世鑒得志毋縱欲兢兢如履冰坎坎念伐輻茍能間此理堪追聖賢躅曉步十韻示山友隱居絶他營曉步緣澗壑水深魚影間林密鳥聲樂晴空極清明孤雲何住著原窮得危磴路轉見橫彴嘯響空谷傳吟情古靈覺所遇皆隱淪論心遺厚薄在山無小草忘世勝大藥餘生豈須計此興諒非錯其適在間曠何用嫌落魄書此以告君狂言君勿噱夜思靜坐四無鄰看山待明月池邊暑氣盡竹上涼颸發伏翼打窗飛孤螢隨草沒豫心適有會還就幽人説事君盡忠行為子當盡孝事君當盡忠凡人不知此斯與犬豕同臣子固貞亮君父或顓蒙乃知守忠孝亦繫於遭逢比干忠以戮申生孝而終忠戮得稱仁孝終宜曰恭古今每如此片言安可窮炳然垂竹帛于以開盲聾所遭雖若彼力行誠在躬於焉二本立足為百行宗忠孝茍純至聞望當昭融此理亘萬世來者能無從嵬嵬山石行山石何嵬嵬孤松何薿薿其大踰百圍其髙過千尺廣厦需梁棟求之若匪克梓人一以視斤斧見促迫牛夫競牽挽輸入王侯宅觀者如堵墻靡不重嘉惜鏤刻以為工丹青以為飾巍然在雲霄七貴所棲息梁棟豈不美殘生良可哀寧作南山松毋為廣厦材四序四序迭遷變春光獨豐茂生意遍羣物動植不違候噰噰塞鴻歸喔喔野雉雊軟草鋪作茵芳葩粲成繡唯有靜者徒抱道終莫售直躬在林藪朝夕飯藜糗與時既乖舛輿臺或加詬俯仰天地間此理終莫究狂吟槿籬三四掩荒竹百十箇無人扣柴扉偏稱潛夫臥夢作野雲飛覺來松日墮隨分有狂吟吟長不須和自紀生無機巧姿所貴唯實踐探玄髮盡霜窮勝足重趼渡水識歸源看雲悟舒卷寧教身不遭頗謂首難俯餘年辭畏途滅迹向絶巘形骸未全枯囂煩幸俱遣中心本難誣萬事不欲辨手把楞伽經交趺對爐篆秋興昔人苦悲秋我獨愛秋色無雲天萬里逺嶠出寒碧楓林葉如丹溪水清見石飽雨豆莢肥經霜栗包拆連疇稻正黃冒野蕎亦白籬菊忽盈把山茰又堪摘日月如過鳥良辰敢虛擲青猿頗會意為我具短策西風吹破帽野興在故屐不憚登涉勞逺訪巢居客此客更可人分我漁樵席人生貴適意何必纍形後早睡天寒常早睡不待日光斂恐礙山猿入柴門未嘗掩落葉打窗鳴枕間疑雨點起視西峯頭月殘星閃閃居山樂居山樂無涯三徑富松菊山體靜吾心山光悅吾目春來山蕨肥秋後山田熟未必王侯家有吾清淨福暑夜步月畏暑不復眠空階踏涼月冰輪了無翳明可數毛髮夜久肝肺清如咽太古雪擬換飛仙人乘鸞上寥泬贈梅見説春方還春猶未相識山童指梅花言是春消息梅花亦含笑道我是知音遮莫隨桃李貪榮變此心相看出此語愛爾良獨深聽之儻不疑足以為規針夜興萬緣不相涉默坐調四肢天理靜中見物情間處知長風掃重隂皎月生東籬寒蟲唧唧鳴亦各知天時悠然發清興朗誦淵明詩人生百年間汲汲奚所為賢愚雖有殊同為來者悲為語髙世流有酒當自持散人詠金散免鎔冶木散逃斧斤人散外榮辱所以為散人世皆賤吾散此散吾自珍偃蹇不任用庶足全其身初夏同趙東閣西里諸公山行聞鶯分韻得隔字今日天氣清聊試登山屐共看雲外峯分坐澗邊石絶境不逢人啼鶯似留客一聲無處尋還被青林隔秋夜感懷秋山夜無人蟲在草根泣明月照髙林虛窗風露入生年四十餘萬事未有立東西岐路間終嵗常汲汲雙親死經年宅兆久完葺兄弟亦貧窶於此不暇給回首思故園愁雲滿原隰交朋閲千百存者已無十顧我枯稿姿奈此短景急終宵不成寐起坐千慮集至人乃忘情俲慕安可及唯作無生觀去此衣袖濕烏棲曲白露生庭蕪明月照栖烏栖烏啼不已閨人中夜起起視西北方翩翩鴈南翔幽燕戍未返云胡不悽傷食薺生無食肉資飯蔬幽壑底朝采南澗芹莫擷東籬薺此中有真味豈必鱠魴鱧何曾萬金饌惡諡不可洗
