body:
  text: 提要潛山集十二卷别集類三宋臣等謹案潛山集十二卷宋釋文珦撰文珦於潛人其生平逰歷略見於所作舊逰一百十韻詩中大抵出家於杭州逰于湖州因而逰浙東至閩由金華嚴陵返越北又至毗陵陽羡金陵淮甸而止後仍歸杭州遘讒下獄久之得免遂遁跡不出以終集中有又看景定新頒朔百嵗還驚五十過句知其生於宋寧宗嘉定三年辛未宋亡時年六十六又杭州薦福寺記題至元乙酉二月遣興詩稱七十七嵗潛山翁則至元丁亥尚存其行事則不少槩見惟咸淳臨安志載咸淳三年九月二十四日賈似道至小麥嶺旌德顯慶寺遊山題名中列衲子四人文珦與焉疑亦托跡朱門者然集中過似道葛嶺舊居詩極詞詆斥若有餘憤而紀事一詩作於似道初貶時其序言似道位亢志驕隂謀篡逆言泄于夏金吾金吾欲誅之懼而宵遁云云雖與宋史所載夏貴請死守淮南似道奔還揚州之事不甚相符而抉摘隱惡至加以曹瞞代漢之罪非似道之黨可知且集中獨吟之作十之九倡和之作不及十之一所與倡和者又不過褚師秀周密周璞仇逺數人皆一時髙人文士亦足徴非干謁之流或似道重其名衲遊山邂逅偶挈同逰遂題名賓從之末亦未可定也其詩多山林閒適之作比興未深而即事諷喻義存勸戒持論率能中理觀其裒集詩稿一篇有云吾學本經論由之契無為書生習未忘有時或吟詩興到即有言長短信所施盡忘工與拙往往不修詞惟覺意頗真亦復無邪思其宗㫖品格可以具見矣厲鶚宋詩紀事所録釋子凡二百四十人顧嗣立元百家詩選所録釋子集凡十五家皆無其禪藻一集搜羅頗富亦不登其一字則是集之佚其來已久今從永樂大典裒輯得詩尚近九百首宋元以前僧詩之工且富者莫或過之乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:6f85c8aab57bc9d8ad651485f5c27615eb8e72bf26a2af2e0932e6ee48b3a43c
