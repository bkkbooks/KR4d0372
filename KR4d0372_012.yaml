body:
  text: 潛山集巻十二宋釋文珦撰七言絶句雲泉吟此心長是愛雲泉平澹相親六十年縱使流歸滄海去清聲祗在屋頭邊落花昨日名園錦萬叢一宵風雨樹頭空浮華往往皆如此誰不看花似夢中嵗晚自沙溪買舟歸社橋酬李秋崖送别韻嵗暮溪頭欲雪天思歸頻問社橋船心知籬落梅花樹已有寒香似去年聴說南中蟒事蟒身漆黒蟒首紅蟒来動地起狂風慙媿蜑巫能制蟒床頭開柙放蜈蚣丈亭别癯翁幾年惆悵限江東暫喜沙頭一笑同依舊扁舟相背發可堪回首月明中别友十年踪跡與君同今日魂銷執手中自是交深難話别不闗秋雨又秋風故人别我江東去不堪回首城邉路明日思君不見君惟有春雲滿江樹古墓不知何代公侯墓酹壇欹傾牧兒聚淒涼翁仲滿身苔獨對寒松泣秋雨深居千巖萬壑幽深地一鉢三衣自在身斷定不行朝市路無因猶識利名人山園三月桃未花春風不入窶人家三月園桃未著花老子放癡都不問山厨日日飯胡麻山桃山桃初熟山人摘中有甜子如藥黒夜寒月落霜在枝擘破獼猴不敢食陌頭陌頭遊子矜年少爭把夭桃比貌紅老眼看来渾似夢開時便與落時同法寳璉師求竹軒南軒竹色映溪光不减吾州五月涼猶恨秋来鷗鷺少須君更為築横塘老懐終向江湖老此身了無機事却難馴沙鷗信是同盟者白首相看意最真聴雪宻片打窻窻自白老翁寒坐正清吟忽聞壓折墻頭竹却想山中積處深㡬夜幾夜自聴松雪響西峯道者不曽来今朝擬得尋幽話溪路清寒却又逥晚春遊人只道花時好老子心偏愛晚春萬紫千紅都謝了緑隂時見採桑人湖亭一堤楊栁青絲輭百頃芙蕖錦障開中有閒人心似水坐看沙鳥鏡中来春晚黄鳥聲中春意深百花如夢已消沉午窻睡覺心無事行過溪南看緑隂客舍春日乆雨自入春来日日隂客愁春恨兩難禁不知門外東風信看見池塘春水深栁花岸栁飛花老却春風前何事巧随人都縁漂蕩無歸處全似天涯倦客身送禪上人歸日本今日送君歸日東便成永别恨難窮海邦萬里波濤隔不似青山有路通送僧歸隠道林身世一何閒去似孤雲不可攀若果怕人知隠迹買山休買有名山送僧還山閒雲一片又飛還松桂蕭森滿舊山後夜有誰相伴住自聴泉落翠微間送僧歸静林精舍天竺山中秋講散露蛬煙鴈動鄉情五株松下梁朝寺歸聴羅浮古磬聲病起病起山房四壁空一年春盡雨聲中無人知道情懐惡獨倚溪橋看落紅卧病厭厭斷聞見年頭未識春風面今朝强起歩晴光傷心滿地殘梅片杜鵑遊魂變化事無涯吴蜀相望萬里賖回首故宫歸不得聲聲啼血染山花老耳聾聵乙酉嵗絶不聞䳌啼湖海漂流嵗月長每聞杜宇輙思鄉如今耳與聲塵絶啼殺吾心也不傷山中隠者居書滿茅堂藥滿園路蹊深絶似桃源夕陽過去樵聲盡一箇獼猴出掩門不出不出柴門三月彊亦無詩句答風光悠然自有深居樂滿徑從教春草長無心出本無心倦即歸悠悠天地一支離此真難與時人說惟有山雲乃得知秋曉訪菊醉陶為爾早辭官醒屈曽將當夕餐我愛露叢深似染曉尋特地犯清寒落葉落葉重重與砌平流泉澹澹入池清無人識我無人到獨自吟詩獨自行不留塵物不畱塵物涴吾清更喜官中無姓名淡飯麄衣随處樂登山臨水一身輕六言絶句湖上雨中晚歸冷澹一堤枯栁孤髙九里寒松行盡北山煙雨白雲深處聞鐘秋思聴說相思情緒難禁最是秋時燕去重増别恨鴈来不報歸期山樓夜月滿千重林壑人凭一曲䦨干但覺衣襟徴潤不知風露髙寒扁舟夜返扁舟頗多幽趣孤月正照寒沙曲渚回塘深處青燈竹屋誰家乆客落日回潮寂寞西風老栁蕭疎乆客自知津渡故人不寄音書晚秋野外隔岸茅茨低小臨溪草徑横斜楊栁已無餘葉芙蓉尚有殘花野外絶巘應蔵佛屋深源定有仙家風裏傳来清梵澗中流出胡麻春曉尋山家石澗寒流不盡茅簷宿雨初晴幽客眠雲未起四時鳥弄春聲夢覺七十五聲更漏一千餘里鄉心夢裏分明歸去覺来無處追尋書山水畫卷逺浦漁舟若箇荒林草屋誰家不信丹青能爾分明鴈落平沙得性得性賢於得禄歸山勝似歸朝飲澗肺腸清浄卧雲魂夢逍遥闕題大藥生自心田神方藴乎靈府不論火候抽添萬病自然良愈衆患皆因有欲一閒全得無聞心定常如止水身安不喜行雲飲罷唯圖睡快老来不作書癡一味古人糟粕誰能更辨醇醨吾生本不識字人謂吾詩入微萹章聊復爾耳止觀然猶庶㡬五言排律剡源山房茅屋小於船寒宵此㑹偏苦吟因靜得幽思與閒便斷壁棲雲氣虛窻閉篆煙帖殘重補畫琴老不勝絃畵軸塵為古茶鑪火自然細泉膠莧腹凍鶴堕松巔石皷鳴如磬甆缾色類鉛雪明燈燄减風逺漏聲傳䑕黠窺人走僮頑背客眠骨清神欲脫興逸語猶顛野性終應在浮名豈足纒欲從支遁隠未有買山錢和盧推官中秋遇雨秋中唯此夕雨蔽月圓時握管沉幽思臨軒失舊期孤燈花謾落良㑹信成虧宋玉悲潛長安仁鬢亦衰簷聲愁裏滴星度暗中移到曉休臨鑑霜髯只自欺錢塘晚渡别友寒月照沙頭輕風引客舟掛㠶重曠望舉櫂復夷猶地勢連吴越星躔次斗牛鴈煙縈别思漁火㸃鄉愁雙鬢誰憐白單衣自怯秋明朝定相憶獨上水邉樓同諸友尋幽登飛来峯湖際山何限飛来獨著名玲瓏疑鬼鑿􅍶崒自天成猿去猶存洞龍歸尚有泓樹因含玉潤泉為煉丹清桂子排空落蓮花浥露擎鷲形傳佛國靈應動神京翻譯賢人迹稽㽞隠者情脩藤垂萬嵗孤石記三生夜講臺偏古春風檜重榮賓王辭可訊慧理塔難平客至心多戀僧居慮自輕躋攀雖詰屈臨眺獨髙明觀闕雄三島衣冠邁百城東南且行在西北待經營溟漲無涯涘江流但注傾一時歸眼界終古播詩聲晚歩晚䇿信所往幽懐那可窮孤村流水外古木亂山中雨過天容浄風收地籟空淡煙歸獨鳥深澗飲長虹日下青峯表潮生滄海東光吞羣象沒氣混百川雄㭬杙知樵子乗舟識釣翁閒身天與健蕭散復誰同馮深居挽詞天地一深翁匡廬氣所鍾親傳厚齋業優得考亭宗勁莭霜崖竹髙標雪嶠松滄溟含雅量干莫避辭鋒元老皆知敬憸夫獨不容畏塗嘗跌足道院蹔潛縱寃白州麾晚身亡奠斝重魂應歸帝所人盡哭堂封有道存方册無名上景鐘死生今隔異湖海昔過從芻束無繇致愁凝五老峯星諸兄挽詞吾宗老兄弟夫子最髙明問學窮根柢公忠出性情夙能全至孝元不念脩程道自成均重身由射䇿榮把麾聞列郡持槖貳春卿得請還山早居家舊疾平正安琳館樂忽報玉樓成死後名逾盛生前志未行他年如定諡諡號决當清閒居多暇追叙舊遊成一百十韻予生駑且鈍良御謾加鞭蹇歩常居後長途靡克前於焉辭里塾竟爾向林泉魯誥方擩嚌真乗又賾研孳孳羞愒日矻矻自窮年靈嶽言猶在天台筆巳専𤣥珠因象得祖印以心傳終覺符深妙初非離簡編連環資講貫涵泳藉詩萹斷斷無他技愔愔合自然從来憎繫屬其肯望陶甄謬忝諸公識常推衆客先嵗時頻問勞旦夕競招延有意行方外因思去日邊書探禹穴古鑑入賀湖漣巖壑争竒秀涇溪互屬聫鄞江浮汗澷雪竇踏雲煙曠望方壺表髙躋太白巔石橋誇聖所華頂歴星躔羽洞僊蹤秘丹丘地勢偏搘笻踰絶嶠杭葦下中川秋蕩懐康樂春池憶恵連尋猿過翠壁訪鶴列青田古郡名存栝仙都頂有蓮江峯何嵂崒馮嶺足迍邅建涉東閩劇茶從北苑煎武夷循窈窱九曲愛回漩境接三山勝名随歴代遷層巒無間斷一水自蜿蜒雪皷何深秀滄溟可泝㳂衣冠常繼踵魚蟹不論錢正欲登衡霍無端信杜鵑遊情方稍稍歸思忽翩翩𤣥笠纔加首青藜亦在肩未窮交廣際俄返浙淮埏姑蔑墟難辯金華洞可穿爛柯人巳徃起石事堪箋新定人民質桐廬物象妍閒詢吟士室重扣釣臺舷風壤連吴越雲山異隴汧富春聊憇止古霅又周旋二水来天目千峯列地田耎麥畦螽揖揖桑野蠋蜎蜎湖石偏求潤山茅競摘鮮毘陵季子邑陽羡蜀僊佃恵阜泉宜瀹侯堂檜不蹎醜梨生檇李佳紙出由拳漸聴華亭鶴將求瀚海鱣闔廬當日覇郛郭入門堅許越夫差誤逃吴太伯賢唯應希范蠡不必慕成鱄鐵甕州形固金陵王氣宣山回石頭壯江下海門遄南北兹為限英雄孰觧填千齡難致詰六代自相挻極目傷京汴懸情比澗瀍未歸文武業猶慕蟻羊羶今古雖興廢山川但幅􅊷地多秦漢迹碑少晉唐鐫題詠詩三百經行路四千豺狼頻犯軛蛟鰐屢驚船曉發蒙霜露宵投閱望弦徃来唯適興遊戯豈離禪身外無餘嗜行中頗自便雲山期浪跡輦寺廹充貟唯曰通宗說何曽問陌阡短長皆以度輕重必於權苦節貞徒爾䜛人不舍旃菲萋成貝錦海嶽起埃㳙事變安能測寃深豈易湔采苓空自賦齧蘖竟誰憐悲寢難成夢愁餐不下咽中心誠匪石直道信如絃白首将沈穽丹忱遂格天釋然消怨結劃爾脫拘攣彼舌知何用吾生固獨全青雲非所覬白日且髙眠頗覺閒情逸渾無俗累牽餘生今老矣此地盍終焉杖為看山拄裳因涉澗褰祗堪朋鹿豕庻免懼鷹鸇于以存吾拙休教謂我儇淺深随象兔飛躍任魚鳶門小無三逕居幽止數椽調琴新得譜坐客舊無氈旨蓄常留甕胡麻或滿篅但令山在目肯頋雪盈顛野飯忘精鑿山肴畧豆籩未嘗嫌菲薄自足養衰孱陋室茅充瓦寒衣艾當綿冷非塵境外静是悟因縁盡棄殘書帙唯留古硯甎雲歸多在樹泉落自成淵孤鶻翻霄健羣猱上木獧水邊梅的皪雨際竹嬋娟貞勁期松柏芳馨尚葯荃草間龍腦出木末兎絲懸澹若忘吾我蕭然去糾纒已能齊指馬豈復記蹄筌元自師調御還曽訊偓佺無心方契佛有藥未為仙置窟嗟毚兎遺身愛蛻蟬岸登當捨筏卜妄不須篿覔句歸陶謝觀空體竺乾性天宜爽朗戒月要孤圓病起形神改年加膂力愆齒疎亡兩版面瘠露雙顴百嵗人應少諸塵相盡捐客来歌九辨僧至說三𤣥白石常同煮青葵亦共搴虛懐本無取那得更悁悁閒興分得此生閒於今老更頑心終如白水身不離青山拙性從人誚前詩或自刪衡門深草色壊衲上苔斑雖有貧居樂猶聞世道艱皇天如有意㑹見古風還不出晚暮衰慵劇因尋此地居山深常見鹿溪淺少蔵魚野徑歸煙僻寒窻映水虛松枯生蘚遍梅老著花疎對月空塵翳眠雲晤卷舒以閒消苑結因静得真如兀坐多凭几徐行不用車公卿誰識我猿鶴最知予善賈休沽玉全生願作樗終身期不出頗自愛吾廬騷為清渭濱作雪深室歌梅林三徳寺清渭濱扁所居室曰雪深潛山老叟見之而喜喜而與之言曰六合之内草木萬殊桃李媚春而轉眼淪漠蒲栁憚秋而掃跡披靡以無堅操故人皆賤之唯梅不然如巢許軰介然獨立雖春光駘蕩羣卉葩艷而不能誘之使從泊如也雖寒風栗烈氷雪凌厲而不能脅之使沮雪愈深精神愈清勁寒英玉潔暗香澹如此其所以為梅而異於衆芳也孟軻氏謂富貴不能滛威武不能屈為大丈夫者得非有取於梅與知子之志可尚也已乃載歌曰積雪兮深深萬卉兮消沈梅獨花兮水之隂容斯静兮暗暗香斯清兮不滛有孤操兮慰予心為髙歌兮詔主林放鶴操相彼胎禽兮有志凌霄翦翎鎩翼兮羈縻於籠牢為時人之近玩兮中心欝陶有髙人兮逆知其然養成羽儀兮縱之於千仭之巔使全其性兮逍遥乎九天九天之髙分穹窿鶴之樂兮融融維髙人之徳兮與天無窮記杭州薦福寺記予備覽前載惟道徳不可泯沒與天地相終始凡見聞者中心悦服捐所重而歸之是以大通成道十方梵天皆獻宫殿請轉法輪迦文利見祗陀給孤施園樹而為施教之地四依垂世盖亦有焉惟師慧基者世為餘杭郡人姓吕氏生劉宋文帝朝㓜即穎悟不藉師保年甫志學啓帝求度所對允愜勑許入道棲志法門立行精苦徧歴講肆洞解羣經小品法華思益維摩金剛勝髪皆探賾幽微専美當世至蕭齊時司徒竟陵文宣王子良訪以法華宗旨師為著義疏王飡服法味不忘於心舊愛郡之海昌邑西安義里清絶閒逺緑水四環嘗置别館為觀遊之所未幾易以為安義寺奉師講演時武帝永明二年也唐武宗㑹昌五年廢宣宗大中十二年復興之迨宋有天下真宗祥符元年遂改今額自始建于今餘七百年宫殿樓閣所以崇佛莊嚴視舊有加粥魚齋鼓以時考擊其徒多宏天台圎宗篤信是道雍雍肅肅不犯律儀一鄉之人罔不敬慕得非基師道徳致效也歟古之王公貴人數踰億兆沙門釋子猶或過之如飄風浮塵随世磨滅有聞於後者詎幾向使文宣不能以地奉基基不能講宣化誘今亦無所稱焉惟其神交道契成此梵刹故使過者咸以手加額而言曰此王者之故址佛子之道塲歴年萬世其名永垂以此視彼不猶愈乎至元乙酉夏五月法堂再新寳寺僧西岑師教倡募之力也教字仲修傳智者道分座白雲出世蓮峯講席久與予遊以院碣舊燬慮來者昧其所從而怠於紹述請叙始末於石冀異日可稽亦以勸勵予喜仲修能不替其先復思淑諸後裔厥志拳拳故樂為書之
